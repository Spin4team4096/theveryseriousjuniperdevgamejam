            peer.on('connection', conn => {
                // Check if this PeerID is already connected
                if (connectedPeerIDs.has(conn.peer)) {
                    log(`Rejecting duplicate connection from ${conn.peer} - already connected as player ${connectedPeerIDs.get(conn.peer)}`)
                    conn.on('open', () => {
                        const randomID = randomInt(1000000000000000, 9999999999999999)
                        const message = {
                            opcode: "P_MSG",
                            payload: JSON.stringify(['disconnect', randomID, {}, `Duplicate connection detected`])
                        }
                        
                        conn.send(JSON.stringify(message))
                        setTimeout(() => conn.close(), 100)
                    })
                    
                    return
                }
                
                if (entityJSON.playerActive.filter(active => active === 1).length >= serverJSON.playerLimit) {
                    log(`Rejecting connection from ${conn.peer} - server full`)
                    conn.on('open', () => {
                        const randomID = randomInt(1000000000000000, 9999999999999999)
                        const message = {
                            opcode: "P_MSG",
                            payload: JSON.stringify(['disconnect', randomID, {}, `Server exceeded player limit of ${serverJSON.playerLimit}`])
                        }
                        
                        conn.send(JSON.stringify(message))
                        setTimeout(() => conn.close(), 100)
                    })
                    
                    return
                }
                
                let playerID = -1
                for (let i = 0; i < serverJSON.playerLimit; i++) {
                    if (entityJSON.playerActive[i] == 0) {
                        playerID = i
                        break
                    }
                }            
                if (playerID === -1) {
                    log(`Rejecting connection from ${conn.peer} - no available slots`)
                    conn.on('open', () => {
                        const randomID = randomInt(1000000000000000, 9999999999999999)
                        const message = {
                            opcode: "P_MSG",
                            payload: JSON.stringify(['disconnect', randomID, {}, `Server exceeded player limit of ${serverJSON.playerLimit}`])
                        }
                        
                        conn.send(JSON.stringify(message))
                        setTimeout(() => conn.close(), 100)
                    })
                    
                    return
                }
                entityJSON.playerActive[playerID] = 1
                playerJSON.lastUpdate[playerID] = -1
                initializePlayer(playerID, conn.peer)
                
                log(`${conn.peer} joined as player ${playerID}!`)
                sound(444, 666); setTimeout(() => sound(544, 666), 100)
                
                conn.playerID = playerID
                connections.push(conn)
                
                // Track the PeerID
                connectedPeerIDs.set(conn.peer, playerID)
                setKey(`${serverJSON.serverID}/playerCount`, entityJSON.playerActive.filter((a, i) => a == 1 && playerJSON.isBot[i] == 0).length)

                conn.on('data', (data) => {
                    try {
                        const message = JSON.parse(data)
                        if (message.opcode === "P_MSG") {
                            const [type, randomID, receivedPlayerID, receivedPackage] = JSON.parse(message.payload)
                            
                            const actualPlayerID = conn.playerID
                            if (type == "playerUpdate") {
                                playerJSON.lastUpdate[actualPlayerID] = 0
                                entityJSON.playerWorldMouseX[actualPlayerID] = receivedPackage.worldMouseX
                                entityJSON.playerWorldMouseY[actualPlayerID] = receivedPackage.worldMouseY
                                if (receivedPackage.serverTick > playerJSON.serverTick[actualPlayerID]) playerJSON.serverTick[actualPlayerID] = receivedPackage.serverTick
                                playerJSON.menu[actualPlayerID] = receivedPackage.menu
                                playerJSON.deathScreen[actualPlayerID] = receivedPackage.deathScreen

                                playerJSON.cameraY[actualPlayerID] = receivedPackage.cameraY
                                if (receivedPackage.username.substring(0,20) != entityJSON.playerUsername[actualPlayerID]) {broadcast('#6696ff', `${receivedPackage.username} joined!`)}

                            }
                        }

        // Helper Functions

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function sound(freq = 440, dur = 200) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            let t = audioCtx.currentTime;
            let end = t + dur/1000;

            osc.type = 'sine';
            osc.frequency.value = freq;

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.3, t+0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, end);

            osc.start(t);
            osc.stop(end);
            
            osc.onended = () => {
                osc.disconnect();
                gain.disconnect();
            };
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                let jj = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[jj]] = [arr[jj], arr[i]];
            }
        }
        
        function degToRad(degrees) {
            return degrees * (Math.PI / 180)
        }

        function radToDeg(radians) {
            return radians * (180 / Math.PI)
        }

        function directionTo(newx, newy, oldx, oldy) {
            return radToDeg(Math.atan2(newy - oldy, newx - oldx))
        }

        function distanceTo(newx, newy, oldx, oldy) {
            return Math.sqrt((newx - oldx) ** 2 + (newy - oldy) ** 2)
        }

        function daysSince2000() {
            const startDate = new Date('2000-01-01T00:00:00Z')
            const currentDate = new Date()
            const diffTime = currentDate - startDate
            return diffTime/(1000*60*60*24)
        }

        function getDate() {
            let d = new Date()
            let day = d.getDate().toString().padStart(2, '0')
            let month = (d.getMonth() + 1).toString().padStart(2, '0')
            let year = d.getFullYear().toString()
            return `${day}/${month}/${year}`
        }

        function randomInt(num1, num2) {return Math.floor(Math.random() * (Math.max(num1, num2) - Math.min(num1, num2) + 1)) + Math.min(num1, num2)}
        function randomFloat(num1, num2) {return Math.random() * (Math.max(num1, num2) - Math.min(num1, num2)) + Math.min(num1, num2)}

        function waitUntil(condition, interval = 100) {
            return new Promise(resolve => {
                const check = () => {

        function encodePacket(sentJSON, newPlayerID, fps) {
            let totalUsernameBytes = 0
            for (let p = 0; p < sentJSON.playerX.length; p++) {
                totalUsernameBytes += new TextEncoder().encode(sentJSON.playerUsername[p].slice(0,20)).length
            }
            let notifText = new TextEncoder().encode(sentJSON.serverNotification.text)
            let bufferSize = 23+(sentJSON.playerX.length*56)+totalUsernameBytes+9+notifText.length
            const buffer = new ArrayBuffer(bufferSize)
            const packet = new DataView(buffer)
            let i = 0

            // Header
            packet.setUint16(i, 1, true); i += 2
            packet.setUint32(i, sentJSON.serverTick, true); i += 4
            packet.setFloat32(i, sentJSON.borderSize, true); i += 4
            packet.setUint8(i, sentJSON.gameStatus); i += 1
            packet.setUint16(i, sentJSON.playerX.length, true); i += 2
            packet.setUint16(i, newPlayerID, true); i += 2
            packet.setUint8(i, fps); i += 1
            packet.setUint16(i, sentJSON.alivePlayers, true); i += 2
            packet.setUint16(i, sentJSON.humanCount, true); i += 2
            packet.setUint16(i, sentJSON.aliveHumans, true); i += 2

            let flags = 0
            if (closing) flags |= 0b00000001
            packet.setUint8(i, flags); i += 1

            // Players
            for (let p = 0; p < sentJSON.playerX.length; p++) {
                packet.setFloat32(i, sentJSON.playerX[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerY[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerSpeedX[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerSpeedY[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerFlailX[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerFlailY[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerFlailSpeedX[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerFlailSpeedY[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerDirection[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerAngularVelocity[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerWorldMouseX[p], true); i += 4
                packet.setFloat32(i, sentJSON.playerWorldMouseY[p], true); i += 4
                packet.setUint8(i, sentJSON.playerHP[p]); i += 1
                packet.setUint8(i, sentJSON.playerSize[p]); i += 1
                packet.setUint16(i, Math.round(sentJSON.playerFlailSize[p]*10), true); i += 2
                packet.setUint8(i, sentJSON.playerRank[p]); i += 1
                packet.setUint8(i, playerColors.indexOf(sentJSON.playerColor[p])); i += 1

                let pflags = 0
                if (sentJSON.playerActive[p]) pflags |= 0b00000001
                if (sentJSON.playerAlive[p]) pflags |= 0b00000010
                if (sentJSON.playerFlailConnected[p]) pflags |= 0b00000100
                if (sentJSON.playerImmune[p]) pflags |= 0b00001000
                if (sentJSON.isBot[p]) pflags |= 0b00010000
                packet.setUint8(i, pflags); i += 1

                let username = new TextEncoder().encode(sentJSON.playerUsername[p].slice(0,20))
                packet.setUint8(i, username.length); i += 1
                for (let j = 0; j < username.length; j++) {
                    packet.setUint8(i+j, username[j])
                }
                i += username.length
            }

            // Notification
            let hex = sentJSON.serverNotification.color.slice(1)
            packet.setUint8(i, parseInt(hex.slice(0, 2), 16)); i += 1
            packet.setUint8(i, parseInt(hex.slice(2, 4), 16)); i += 1
            packet.setUint8(i, parseInt(hex.slice(4, 6), 16)); i += 1
            packet.setUint16(i, notifText.length, true); i += 2
            for (let j = 0; j < notifText.length; j++) {
                packet.setUint8(i+j, notifText[j])
            }
            i += notifText.length
            packet.setUint32(i, sentJSON.serverNotification.id, true); i += 4

            return packet
        }

        function sendData(peerID, type, data, data2, data3, data4, data5) {
            const randomID = randomInt(1000000000000000, 9999999999999999)
            let payload
            if (type === "entityData") {
                const encodedPacket = encodePacket(data, data2.ID, data2.tps)
                const bytes = new Uint8Array(encodedPacket.buffer)
                let binary = ''
                for (let i = 0; i < bytes.byteLength; i++) {
                    binary += String.fromCharCode(bytes[i])
                }
                payload = JSON.stringify([type, randomID, btoa(binary)])
            } else {
                payload = JSON.stringify([type, randomID, data, data2, data3, data4, data5])
            }
            const message = {
                opcode: "P_MSG",
                payload: payload
            }
            const connection = connections.find(conn => conn.peer === peerID)

            if (connection && connection.open) {
                connection.send(JSON.stringify(message))
                return true
            } else {
                return false
            }
        }

        function disconnectPeer(peerID, reason = "Disconnected by server") {
            const connection = connections.find(conn => conn.peer === peerID)
            
            if (connection && connection.open) {
                sendData(peerID, 'disconnect', {}, reason)
                setTimeout(() => {
                    connection.close()
                    connections = connections.filter(conn => conn.peer !== peerID)
                    log(`Disconnected peer ${peerID}: ${reason}`)
                    sound(444, 666); setTimeout(() => sound(400, 666), 100)
                }, 100)
                return true
            }
            return false
        }

                }
            }, 5000)

            setKey(`${serverJSON.serverID}/createdAt`, Date.now())
            log(`Server added to firebase list`)

            serverInFirebase = true
            database.ref(`flingy/servers/serverList`).on('value', snap => {
                let list = snap.val()
                if (!list || !Array.isArray(list)) list = list ? [list] : []
                serverInFirebase = list.includes(serverJSON.serverID)
            })

            gameStatus = 0
            stateTick = 0
            countdownStartTick = 0
            botSpawnTimer = 0

            // Core loop
            steps = 10
            fpsHistory = []
            avgFps = 30
            msptHistory = []
            avgMspt = 0
            trackServerLifetime()
            trackServerIssues()
            trackServerStatus()
            log(`Server Started!`)
            sendDiscordMessage(`:green_circle: [${serverJSON.serverID.replace(/^flingy_/, '')}] ${serverJSON.playerLimit}-player **${serverJSON.serverName}** server started! **${serverList.length}** total flingy.io servers now.`)

            running = true
            closing = false
            serverTick = 0
            const intervalID = setInterval(() => {
                if (!running) {
                    clearInterval(intervalID)
                    return
                }
                soundCount = 0

                serverTick++
                entityJSON.serverTick = serverTick

                let frameStart = performance.now()

                // Update server stats
                frameCount++
                const now = Date.now()
                if (now-lastFpsUpdate >= 1000) {
                    fps = Math.round((frameCount*1000)/(now-lastFpsUpdate))
                    fpsHistory.push(fps)
                    if (fpsHistory.length > 30) fpsHistory.shift()
                    avgFps = fpsHistory.reduce((a, b) => a+b, 0)/fpsHistory.length
                    
                    document.getElementById('fps-count').textContent = fps
                    document.getElementById('fps-avg').textContent = avgFps.toFixed(2)
                    
                    frameCount = 0
                    lastFpsUpdate = now
                }
                if (fpsHistory.length >= 30) {
                    avgFps = fpsHistory.reduce((a, b) => a+b, 0)/fpsHistory.length
                    issuesJSON.lagging = avgFps < 27.5 ? 1 : 0
                }

                document.getElementById('player-count').textContent = entityJSON.playerActive.filter(active => active === 1).length
                document.getElementById('connection-count').textContent = connections.filter(c => c.open).length

                // matchmaking + physics
                let activePlayers = entityJSON.playerActive.filter(a => a == 1).length
                let alivePlayers = entityJSON.playerHP.filter((a, i) => a > 0 && entityJSON.playerActive[i] == 1).length

                // Bot spawning
                if (serverJSON.spawnBots && (gameStatus == 0 || gameStatus == 1)) {
                    let humanPlayers = 0
                    let totalPlayers = 0
                    for (let i = 0; i < serverJSON.playerLimit; i++) {
                        if (entityJSON.playerActive[i] == 1) {
                            totalPlayers++
                            if (playerJSON.isBot[i] == 0) humanPlayers++
                        }
                    }

                    if (gameStatus == 0) {
                        if (humanPlayers == 1 && totalPlayers < 2) {
                            if (botSpawnTimer == 0) botSpawnTimer = randomInt(0, 150)
                            botSpawnTimer--
                            if (botSpawnTimer <= 0) {
                                botSpawnTimer = 0
                                totalPlayers++
                            }
                        } else {
                            botSpawnTimer = 0
                        }
                    } else if (gameStatus == 1) {
                        botSpawnTimer = 0
                        let countdownEndTick = stateTick-30
                        let deadlineTick = stateTick-15
                        let maxCap = Math.floor(serverJSON.playerLimit/2)
                        let targetTotal = clamp(Math.round(2 + (maxCap-2) * clamp((serverTick-countdownStartTick) / (countdownEndTick-countdownStartTick), 0, 1)), 2, maxCap)

                        if (totalPlayers < targetTotal) {
                            let ticksLeft = deadlineTick - serverTick
                            if (ticksLeft <= 0) totalPlayers = targetTotal
                            else if (Math.random() < (targetTotal-totalPlayers)*16 / ticksLeft) totalPlayers++
                        }
                    }

                    while (totalPlayers > entityJSON.playerActive.filter(a => a == 1).length) {
                        let slot = -1
                        for (let i = 0; i < serverJSON.playerLimit; i++) {
                            if (entityJSON.playerActive[i] == 0) {
                                slot = i
                                break
                            }
                        }
                        if (slot == -1) break
                        initializePlayer(slot, `bot_${randomInt(1000000000000000, 9999999999999999)}`, true)
                    }
                }

                // If all humans left, remove bots in any state
                let humanCount = 0
                for (let i = 0; i < serverJSON.playerLimit; i++) {
                    if (entityJSON.playerActive[i] == 1 && playerJSON.isBot[i] == 0) humanCount++
                }
                if (humanCount == 0 && activePlayers > 0) {
                    for (let i = 0; i < serverJSON.playerLimit; i++) {
                        if (playerJSON.isBot[i] == 1) clearPlayerSlot(i)
                    }
                    gameStatus = 0
                    entityJSON.borderSize = serverJSON.borderSize
                    stateTick = serverTick
                    serverStatus = 0
                    setKey(`${serverJSON.serverID}/status`, '0')
                    setKey(`${serverJSON.serverID}/playerCount`, 0)
                }

                if (gameStatus == 0) {
                    // waiting for players
                    entityJSON.borderSize = serverJSON.borderSize
                    if (activePlayers >= 2) {
                        gameStatus = 1
                        countdownStartTick = serverTick
                        stateTick = serverTick + (activePlayers < serverJSON.playerLimit/2 ? (serverJSON.countdownTime || 60)*30 : (serverJSON.countdownTime || 60)*30/2)
                        broadcast('#6696ff', `Game starting soon... (${activePlayers}/${serverJSON.playerLimit})`)
                    }
                } else if (gameStatus == 1) {
                    // countdown - x seconds or until full
                    entityJSON.borderSize = serverJSON.borderSize
                    let newStateTick = countdownStartTick + (activePlayers < serverJSON.playerLimit/2 ? (serverJSON.countdownTime || 60)*30 : (serverJSON.countdownTime || 60)*30/2)
                    if (newStateTick > serverTick) stateTick = Math.min(stateTick, newStateTick)
                    if (activePlayers < 2) {
                        gameStatus = 0
                        stateTick = serverTick
                        broadcast('#ff6666', `Not enough players. Waiting for more...`)
                    } else if (activePlayers >= serverJSON.playerLimit || serverTick >= stateTick) {
                        gameStatus = 2
                        spawnSound(0, 0, 'gamestart', false)
                        stateTick = serverTick
                        for (let i=0; i < serverJSON.playerLimit; i++) {
                            entityJSON.playerFlailSize[i] = 5
                        }
                        broadcast('#2d8f2d', `Game started! GO FLING THOSE FLAILS!!!`)
                    }
                } else if (gameStatus == 2) {
                    if (entityJSON.playerHP.some((hp, idx) => hp < 3 && entityJSON.playerAlive[idx] == 1) && serverStatus == 0) {
                        serverStatus = 1
                        setKey(`${serverJSON.serverID}/status`, '1')
                        broadcast('#6696ff', `Server Locked: No new players can join.`) // maybe remove this if it gets annoying
                    }
                    // playing - pvp on
                    entityJSON.borderSize = clamp(entityJSON.borderSize - (serverJSON.borderSize - 100) / 6500, 100, serverJSON.borderSize)
                    if (entityJSON.borderSize <= 100 && gameStatus == 2) {
                        for (let i=0; i < serverJSON.playerLimit; i++) {
                            if (entityJSON.playerAlive[i] == 1) {
                                entityJSON.playerHP[i] -= 1/((10+entityJSON.playerFlailSize[i]/100*10)*30)
                                if (entityJSON.playerHP[i] <= 0) {
                                    entityJSON.playerHP[i] = 0
                                    entityJSON.playerAlive[i] = 0
                                    entityJSON.playerRank[i] = entityJSON.playerHP.filter((hp, idx) => hp > 0 && entityJSON.playerAlive[idx] == 1).length+1
                                }
                            }
                        }
                    }

                    if (alivePlayers <= 1) {
                        gameStatus = 3
                        stateTick = serverTick+7*30
                        broadcast('#ff9966', `Game over! Restarting soon...`)
                        if (entityJSON.playerAlive.findIndex(a => a == 1) != -1) spawnSound(entityJSON.playerX[entityJSON.playerAlive.findIndex(a => a == 1)], entityJSON.playerY[entityJSON.playerAlive.findIndex(a => a == 1)], 'victory', true, entityJSON.playerAlive.findIndex(a => a == 1))
                    }
                } else if (gameStatus == 3) {
                    // ending
                    if (serverTick >= stateTick) {
                        let connsToClose = connections.slice()
                        for (let i = 0; i < connsToClose.length; i++) {
                            try {
                                sendData(connsToClose[i].peer, 'disconnect', {}, 'Game over!')
                                connsToClose[i].close()
                            } catch {}
                        }
                        connections = []
                        connectedPeerIDs.clear()
                        for (let i = 0; i < serverJSON.playerLimit; i++) {
                            clearPlayerSlot(i)
                        }
                        gameStatus = 0
                        entityJSON.borderSize = serverJSON.borderSize
                        stateTick = serverTick
                        serverStatus = 0
                        setKey(`${serverJSON.serverID}/status`, '0')
                        setKey(`${serverJSON.serverID}/playerCount`, 0)
                        broadcast('#ff9966', `Waiting for players...`)
                    }
                }

                if (serverTick % (30*7) == 0) {
                    if (gameStatus == 0) {
                        broadcast('#ff9966', `Waiting for players... (${activePlayers}/${serverJSON.playerLimit})`)
                    } else if (gameStatus == 1) {
                        let remaining = Math.ceil((stateTick-serverTick)/30)
                        if (remaining > 0) {
                            broadcast('#6696ff', `Game starting in ${remaining} seconds... (${activePlayers}/${serverJSON.playerLimit})`)
                        }
                    }
                }
                if (serverTick % (30*14) == 1 && gameStatus == 0) {
                    broadcast('#ff9966', `If no one else is online, ping your friends to join!`)
                }

                // player movement
                for (let i=0; i < serverJSON.playerLimit; i++) {
                    if (entityJSON.playerActive[i] == 1) {
                        playerJSON.lastUpdate[i]++
                        if (playerJSON.lastUpdate[i] > 10*30) {
                            let conn = connections.find(c => c.playerID == i)
                            if (conn) disconnectPeer(conn.peer, `AFK timeout`)
                            playerJSON.lastUpdate[i] = -1
                            continue
                        }
                    }
                    if (entityJSON.playerAlive[i] == 1) {
                        if (playerJSON.isBot[i] == 1) {
                            playerJSON.lastUpdate[i] = 0
                            let brain = playerJSON.botBrain[i]

                            if (brain.state == 'move') {
                                brain.stateTimer++

                                // Check for incoming disconnected flails to dodge
                                let dodgeAngle = null
                                for (let j = 0; j < serverJSON.playerLimit; j++) {
                                    if (j == i) continue
                                    if (entityJSON.playerFlailConnected[j] == 0 && entityJSON.playerAlive[j] == 1 && entityJSON.playerActive[j] == 1) {
                                        let fdist = distanceTo(entityJSON.playerFlailX[j], entityJSON.playerFlailY[j], entityJSON.playerX[i], entityJSON.playerY[i])
                                        if (fdist < 250) {
                                            let flailAngle = radToDeg(Math.atan2(entityJSON.playerFlailSpeedY[j], entityJSON.playerFlailSpeedX[j]))
                                            let angleToBot = directionTo(entityJSON.playerX[i], entityJSON.playerY[i], entityJSON.playerFlailX[j], entityJSON.playerFlailY[j])
                                            let angleDiff = Math.abs(flailAngle - angleToBot)
                                            if (angleDiff > 180) angleDiff = 360 - angleDiff
                                            if (angleDiff < 40) {
                                                dodgeAngle = flailAngle + 90
                                                break
                                            }
                                        }
                                    }
                                }

                                if (dodgeAngle != null) {
                                    entityJSON.playerWorldMouseX[i] = entityJSON.playerX[i] + Math.cos(degToRad(dodgeAngle))*200
                                    entityJSON.playerWorldMouseY[i] = entityJSON.playerY[i] + Math.sin(degToRad(dodgeAngle))*200
                                } else if (gameStatus != 2) {
                                    // Wander to random target
                                    if (brain.targetX == 0 && brain.targetY == 0 || distanceTo(brain.targetX, brain.targetY, entityJSON.playerX[i], entityJSON.playerY[i]) < 50) {
                                        brain.targetX = randomInt(-entityJSON.borderSize, entityJSON.borderSize)
                                        brain.targetY = randomInt(-entityJSON.borderSize, entityJSON.borderSize)
                                    }
                                    let wanderAngle = directionTo(brain.targetX, brain.targetY, entityJSON.playerX[i], entityJSON.playerY[i])
                                    entityJSON.playerWorldMouseX[i] = entityJSON.playerX[i] + Math.cos(degToRad(wanderAngle))*200
                                    entityJSON.playerWorldMouseY[i] = entityJSON.playerY[i] + Math.sin(degToRad(wanderAngle))*200
                                } else {
                                    // Chase if flail connected, run away if disconnected
                                    let closestDist = Infinity
                                    let closestX = 0
                                    let closestY = 0
                                    for (let j = 0; j < serverJSON.playerLimit; j++) {
                                        if (j == i) continue
                                        if (entityJSON.playerAlive[j] == 1 && entityJSON.playerActive[j] == 1) {
                                            let pdist = distanceTo(entityJSON.playerX[j], entityJSON.playerY[j], entityJSON.playerX[i], entityJSON.playerY[i])
                                            if (pdist < closestDist) {
                                                closestDist = pdist
                                                closestX = entityJSON.playerX[j]
                                                closestY = entityJSON.playerY[j]
                                            }
                                        }
                                    }
                                    if (closestDist < Infinity) {
                                        let moveAngle = directionTo(closestX, closestY, entityJSON.playerX[i], entityJSON.playerY[i])
                                        if (entityJSON.playerFlailConnected[i] == 0) moveAngle = moveAngle + 180
                                        entityJSON.playerWorldMouseX[i] = entityJSON.playerX[i] + Math.cos(degToRad(moveAngle))*200
                                        entityJSON.playerWorldMouseY[i] = entityJSON.playerY[i] + Math.sin(degToRad(moveAngle))*200
                                    }
                                }

                                playerJSON.leftMouseDown[i] = 0

                                if (brain.stateTimer >= 80) {
                                    brain.state = 'spin'
                                    brain.stateTimer = 0
                                    brain.spinDirection = Math.random() < 0.5 ? 1 : -1
                                }
                            } else if (brain.state == 'spin') {
                                brain.stateTimer++

                                // Spin flail perpendicular to facing direction
                                let spinAngle = entityJSON.playerDirection[i] + serverJSON.botSpinSpeed*brain.spinDirection
                                entityJSON.playerWorldMouseX[i] = entityJSON.playerX[i] + Math.cos(degToRad(spinAngle))*200
                                entityJSON.playerWorldMouseY[i] = entityJSON.playerY[i] + Math.sin(degToRad(spinAngle))*200

                                // Emergency release if about to be hit
                                let shouldRelease = false
                                for (let j = 0; j < serverJSON.playerLimit && !shouldRelease; j++) {
                                    if (j == i) continue
                                    if (entityJSON.playerAlive[j] != 1 || entityJSON.playerActive[j] != 1) continue
                                    let fdist = distanceTo(entityJSON.playerFlailX[j], entityJSON.playerFlailY[j], entityJSON.playerX[i], entityJSON.playerY[i])
                                    let fspeed = Math.sqrt(entityJSON.playerFlailSpeedX[j]*entityJSON.playerFlailSpeedX[j] + entityJSON.playerFlailSpeedY[j]*entityJSON.playerFlailSpeedY[j])
                                    if (fdist < fspeed*3+entityJSON.playerFlailSize[j]/2+entityJSON.playerSize[i]/2) {
                                        let fangle = radToDeg(Math.atan2(entityJSON.playerFlailSpeedY[j], entityJSON.playerFlailSpeedX[j]))
                                        let angleToBot = directionTo(entityJSON.playerX[i], entityJSON.playerY[i], entityJSON.playerFlailX[j], entityJSON.playerFlailY[j])
                                        let adiff = Math.abs(fangle - angleToBot)
                                        if (adiff > 180) adiff = 360 - adiff
                                        if (adiff < 45 && entityJSON.playerFlailConnected[i] == 1 && gameStatus == 2) {
                                            shouldRelease = true
                                        }
                                    }
                                }

                                // Check if should release - simulate trajectory like client trail
                                if (entityJSON.playerFlailConnected[i] == 1 && gameStatus == 2 && brain.stateTimer > 15) {
                                    let flailSpeed = Math.sqrt(entityJSON.playerFlailSpeedX[i]*entityJSON.playerFlailSpeedX[i] + entityJSON.playerFlailSpeedY[i]*entityJSON.playerFlailSpeedY[i])
                                    if (flailSpeed > 1) {
                                        let dirX = entityJSON.playerFlailSpeedX[i] / flailSpeed
                                        let dirY = entityJSON.playerFlailSpeedY[i] / flailSpeed
                                        let travelDist = flailSpeed / 0.04
                                        let hitWidth = entityJSON.playerFlailSize[i]+serverJSON.botAccuracy

                                        for (let j = 0; j < serverJSON.playerLimit; j++) {
                                            if (j == i) continue
                                            if (entityJSON.playerAlive[j] == 1 && entityJSON.playerActive[j] == 1) {
                                                // Transform player position to flail-local space
                                                let dx = entityJSON.playerX[j] - entityJSON.playerFlailX[i]
                                                let dy = entityJSON.playerY[j] - entityJSON.playerFlailY[i]
                                                let localX = dx*dirX + dy*dirY
                                                let localY = -dx*dirY + dy*dirX

                                                if (localX > 0 && localX < travelDist && Math.abs(localY) < hitWidth/2) {
                                                    if (Math.random()*100 < entityJSON.playerFlailSize[i]*entityJSON.playerFlailSize[i]/100) {
                                                        shouldRelease = true
                                                        break
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }

                                if (shouldRelease) {
                                    playerJSON.leftMouseDown[i] = 1
                                    brain.state = 'move'
                                    brain.stateTimer = 0
                                } else {
                                    playerJSON.leftMouseDown[i] = 0
                                }

                                // Transition to move if flail disconnected or maxed out
                                if (entityJSON.playerFlailConnected[i] == 0 || entityJSON.playerFlailSize[i] >= 100) {
                                    brain.state = 'move'
                                    brain.stateTimer = 0
                                }
                            }
                        }
                        if (entityJSON.playerImmune[i] == 1) {
                            playerJSON.timeLeftImmune[i] -= 1
                            if (playerJSON.timeLeftImmune[i] <= 0) {
                                entityJSON.playerImmune[i] = 0
                            }
                        }
                        // controls
                        if (entityJSON.playerFlailConnected[i] == 1 && playerJSON.leftMouseDown[i] == true && playerJSON.flingUsed[i] == 0 && gameStatus == 2) {
                            entityJSON.playerFlailConnected[i] = 0
                            entityJSON.playerSpeedX[i] += Math.cos(degToRad(entityJSON.playerDirection[i]+180))*(7.5+entityJSON.playerFlailSize[i]*0.075)
                            entityJSON.playerSpeedY[i] += Math.sin(degToRad(entityJSON.playerDirection[i]+180))*(7.5+entityJSON.playerFlailSize[i]*0.075)
                            playerJSON.flingUsed[i] = 1
                            entityJSON.playerImmune[i] = 0
                            spawnSound(entityJSON.playerX[i], entityJSON.playerY[i], 'sling')
                        }
                        if (playerJSON.leftMouseDown[i] == false) {
                            playerJSON.flingUsed[i] = 0
                        }
                        // player movement
                        //let oldDirection = entityJSON.playerDirection[i]
                        //entityJSON.playerDirection[i] += (diff = directionTo(entityJSON.playerWorldMouseX[i], entityJSON.playerWorldMouseY[i], entityJSON.playerX[i], entityJSON.playerY[i])-entityJSON.playerDirection[i], diff = ((diff%360)+540)%360-180, diff/5)
                        //entityJSON.playerAngularVelocity[i] = entityJSON.playerDirection[i]-oldDirection
                        let rawDiff = directionTo(entityJSON.playerWorldMouseX[i], entityJSON.playerWorldMouseY[i], entityJSON.playerX[i], entityJSON.playerY[i]) - entityJSON.playerDirection[i]
                        let diff = Math.atan2(Math.sin(rawDiff * Math.PI / 180), Math.cos(rawDiff * Math.PI / 180)) * 180 / Math.PI
                        entityJSON.playerAngularVelocity[i] = entityJSON.playerAngularVelocity[i] * (entityJSON.playerFlailConnected[i] == 1 ? 0.9 : 0.5) + diff * 0.03 / (entityJSON.playerFlailConnected[i] == 1 ? (1 + Math.sqrt(entityJSON.playerFlailSize[i]) / 10) : 0.5)
                        entityJSON.playerDirection[i] += entityJSON.playerAngularVelocity[i]
                        if (entityJSON.playerFlailConnected[i] == 1) entityJSON.playerFlailSize[i] += Math.abs(entityJSON.playerAngularVelocity[i])/50
                        if (entityJSON.playerFlailConnected[i] == 1) {
                            entityJSON.playerFlailSize[i] = clamp(entityJSON.playerFlailSize[i]-0.1, 5, 100)
                        } else {
                            if (entityJSON.playerFlailSize[i] > 5) {
                                entityJSON.playerFlailSize[i] = clamp(entityJSON.playerFlailSize[i]-0.3, 0, 100)
                            } else {
                                entityJSON.playerFlailSize[i] = clamp(entityJSON.playerFlailSize[i]-0.1, 0, 100)
                            }
                            if (entityJSON.playerFlailSize[i] <= 0 || Math.sqrt((entityJSON.playerFlailSpeedX[i]**2)+(entityJSON.playerFlailSpeedY[i]**2)) < 0.5) {
                                entityJSON.playerFlailConnected[i] = 1
                                playerJSON.flingUsed[i] = 1 // temp fix to fix instant velocity bug, where flails have insane velocity when teleporting back to the player
                            }
                        }

                        if (distanceTo(entityJSON.playerWorldMouseX[i], entityJSON.playerWorldMouseY[i], entityJSON.playerX[i], entityJSON.playerY[i]) > 25) {
                            entityJSON.playerSpeedX[i] += Math.cos(degToRad(entityJSON.playerDirection[i]))*0.3
                            entityJSON.playerSpeedY[i] += Math.sin(degToRad(entityJSON.playerDirection[i]))*0.3
                        }
                        entityJSON.playerSpeedX[i] *= 0.92
                        entityJSON.playerSpeedY[i] *= 0.92

                        entityJSON.playerX[i] += entityJSON.playerSpeedX[i]
                        entityJSON.playerY[i] += entityJSON.playerSpeedY[i]
                        entityJSON.playerX[i] = clamp(entityJSON.playerX[i], -entityJSON.borderSize+entityJSON.playerSize[i]/2, entityJSON.borderSize-entityJSON.playerSize[i]/2)
                        entityJSON.playerY[i] = clamp(entityJSON.playerY[i], -entityJSON.borderSize+entityJSON.playerSize[i]/2, entityJSON.borderSize-entityJSON.playerSize[i]/2)
                        
                        // flail movement
                        if (entityJSON.playerFlailConnected[i] == 1) {
                            let oldFlailX = entityJSON.playerFlailX[i]
                            let oldFlailY = entityJSON.playerFlailY[i]
                            entityJSON.playerFlailX[i] = entityJSON.playerX[i]+(Math.cos(degToRad(entityJSON.playerDirection[i])))*(20+entityJSON.playerSize[i]/2+entityJSON.playerFlailSize[i]/2)
                            entityJSON.playerFlailY[i] = entityJSON.playerY[i]+(Math.sin(degToRad(entityJSON.playerDirection[i])))*(20+entityJSON.playerSize[i]/2+entityJSON.playerFlailSize[i]/2)
                            entityJSON.playerFlailSpeedX[i] = entityJSON.playerFlailX[i]-oldFlailX
                            entityJSON.playerFlailSpeedY[i] = entityJSON.playerFlailY[i]-oldFlailY
                        } else {
                            entityJSON.playerFlailSpeedX[i] *= 0.96
                            entityJSON.playerFlailSpeedY[i] *= 0.96
                            entityJSON.playerFlailX[i] += entityJSON.playerFlailSpeedX[i]
                            entityJSON.playerFlailY[i] += entityJSON.playerFlailSpeedY[i]
                        }
                        entityJSON.playerFlailX[i] = clamp(entityJSON.playerFlailX[i], -entityJSON.borderSize-entityJSON.playerFlailSize[i]/2, entityJSON.borderSize+entityJSON.playerFlailSize[i]/2)
                        entityJSON.playerFlailY[i] = clamp(entityJSON.playerFlailY[i], -entityJSON.borderSize-entityJSON.playerFlailSize[i]/2, entityJSON.borderSize+entityJSON.playerFlailSize[i]/2)

                        // collision
                        for (let p=0; p < entityJSON.playerX.length; p++) {
                            if (distanceTo(entityJSON.playerX[p], entityJSON.playerY[p], entityJSON.playerFlailX[i], entityJSON.playerFlailY[i]) <= (entityJSON.playerSize[p]/2)+(entityJSON.playerFlailSize[i]/2) && entityJSON.playerAlive[p] == 1) {
                                if (p == i) {
                                    entityJSON.playerFlailConnected[i] = 1
                                    playerJSON.flingUsed[i] = 1 // temp fix to fix instant velocity bug, where flails have insane velocity when teleporting back to the player
                                } else if (gameStatus == 2 && entityJSON.playerImmune[i] == 0 && entityJSON.playerImmune[p] == 0) {
                                    entityJSON.playerHP[p] -= 1
                                    entityJSON.playerAlive[p] = 0
                                    playerJSON.timeUntilRespawn[p] = 90
                                    spawnSound(entityJSON.playerX[p], entityJSON.playerY[p], Math.random() < 0.5 ? 'hit1' : 'hit2')
                                    if (serverJSON.addMoney) {
                                        let conn = connections.find(c => c.playerID == i); if (conn) sendData(conn.peer, 'addMoney', 1)
                                    }
                                    if (entityJSON.playerHP[p] <= 0) {
                                        entityJSON.playerRank[p] = (entityJSON.playerHP.filter((hp, idx) => hp > 0 && entityJSON.playerAlive[idx] == 1).length)+1
                                        broadcast('#ff6666', randomDeathMessage(`${playerJSON.isBot[i] ? '[BOT] ' : ''}${entityJSON.playerUsername[i]}`, `${playerJSON.isBot[p] ? '[BOT] ' : ''}${entityJSON.playerUsername[p]}`, true))
                                        spawnSound(entityJSON.playerX[p], entityJSON.playerY[p], 'lose', true, p)
                                    } else {
                                        broadcast('#ff9966', randomDeathMessage(`${playerJSON.isBot[i] ? '[BOT] ' : ''}${entityJSON.playerUsername[i]}`, `${playerJSON.isBot[p] ? '[BOT] ' : ''}${entityJSON.playerUsername[p]}`, false))
                                        entityJSON.playerX[p] = randomInt(-entityJSON.borderSize,entityJSON.borderSize)
                                        entityJSON.playerY[p] = randomInt(-entityJSON.borderSize,entityJSON.borderSize)
                                        entityJSON.playerSpeedX[p] = 0
                                        entityJSON.playerSpeedY[p] = 0
                                    }
                                }
                            }
                        }
                        if (gameStatus != 2) {
                            for (let p=i+1; p<serverJSON.playerLimit; p++) {
                                if (entityJSON.playerAlive[p]!=1) continue
                                let dx=entityJSON.playerX[i]-entityJSON.playerX[p]
                                let dy=entityJSON.playerY[i]-entityJSON.playerY[p]
                                let dist=Math.sqrt(dx*dx+dy*dy)
                                if (dist<100 && dist>0) {
                                    let force=(100-dist)/100
                                    entityJSON.playerSpeedX[i]+=dx/dist*force
                                    entityJSON.playerSpeedY[i]+=dy/dist*force
                                    entityJSON.playerSpeedX[p]-=dx/dist*force
                                    entityJSON.playerSpeedY[p]-=dy/dist*force
                                }
                            }
                        }

                    } else if (entityJSON.playerHP[i] > 0) {
                        playerJSON.timeUntilRespawn[i] -= 1
                        if (playerJSON.timeUntilRespawn[i] <= 0) {
                            entityJSON.playerAlive[i] = 1
                            entityJSON.playerFlailSize[i] = entityJSON.playerFlailSize[i]*0.64
                            entityJSON.playerFlailConnected[i] = 1
                            playerJSON.flingUsed[i] = 1 // temp fix to fix instant velocity bug, where flails have insane velocity when teleporting back to the player
                            spawnSound(entityJSON.playerX[i], entityJSON.playerY[i], 'eliminated', true, i)
                            entityJSON.playerImmune[i] = 1
                            playerJSON.timeLeftImmune[i] = 60
                        }
                    } else {
                        // out for good, cam't do anything
                    }
                }

                // send data to all players
                entityJSON.gameStatus = gameStatus
                if (connections.length > 0) {
                    for (let c = 0; c < connections.length; c++) {
                        let playerID = connections[c].playerID
                        let playerPackage = {
                            ID: playerID,
                            tps: fps
                        }
                        
                        let clientTick = Number(playerJSON.serverTick[playerID]) || 0
                        let framesBehind = serverTick-clientTick
                        let framesPerUpdate = Math.ceil(clamp((framesBehind-2)/5, 1, 100))
                        
                        if (!playerJSON.lastSentTick[playerID]) playerJSON.lastSentTick[playerID] = 0
                        
                        if (serverTick % framesPerUpdate == 0) {
                            let activeIndices = []
                            for (let i = 0; i < serverJSON.playerLimit; i++) {
                                if (i == playerID || entityJSON.playerAlive[i] > 0) activeIndices.push(i)
                            }
                            let newPlayerID = activeIndices.indexOf(playerID)

                            let sentJSON = {
                                serverTick: entityJSON.serverTick,
                                borderSize: entityJSON.borderSize,
                                gameStatus: entityJSON.gameStatus,
                                serverNotification: entityJSON.serverNotification,
                                alivePlayers: entityJSON.playerHP.filter((hp, idx) => hp > 0).length,
                                humanCount: entityJSON.playerActive.filter((a, i) => a == 1 && playerJSON.isBot[i] == 0).length,
                                aliveHumans: entityJSON.playerHP.filter((hp, i) => hp > 0 && playerJSON.isBot[i] == 0).length,

                                playerID: activeIndices.map(i => entityJSON.playerID[i]),
                                playerActive: activeIndices.map(i => entityJSON.playerActive[i]),
                                playerAlive: activeIndices.map(i => entityJSON.playerAlive[i]),
                                playerHP: activeIndices.map(i => entityJSON.playerHP[i]),
                                playerUsername: activeIndices.map(i => entityJSON.playerUsername[i]),
                                playerX: activeIndices.map(i => entityJSON.playerX[i]),
                                playerY: activeIndices.map(i => entityJSON.playerY[i]),
                                playerSpeedX: activeIndices.map(i => entityJSON.playerSpeedX[i]),
                                playerSpeedY: activeIndices.map(i => entityJSON.playerSpeedY[i]),
                                playerSize: activeIndices.map(i => entityJSON.playerSize[i]),
                                playerFlailX: activeIndices.map(i => entityJSON.playerFlailX[i]),
                                playerFlailY: activeIndices.map(i => entityJSON.playerFlailY[i]),
                                playerFlailSpeedX: activeIndices.map(i => entityJSON.playerFlailSpeedX[i]),
                                playerFlailSpeedY: activeIndices.map(i => entityJSON.playerFlailSpeedY[i]),
                                playerFlailConnected: activeIndices.map(i => entityJSON.playerFlailConnected[i]),
                                playerFlailSize: activeIndices.map(i => entityJSON.playerFlailSize[i]),
                                playerDirection: activeIndices.map(i => entityJSON.playerDirection[i]),
                                playerAngularVelocity: activeIndices.map(i => entityJSON.playerAngularVelocity[i]),
                                playerWorldMouseX: activeIndices.map(i => entityJSON.playerWorldMouseX[i]),
                                playerWorldMouseY: activeIndices.map(i => entityJSON.playerWorldMouseY[i]),
                                playerRank: activeIndices.map(i => entityJSON.playerRank[i]),
                                playerImmune: activeIndices.map(i => entityJSON.playerImmune[i]),
                                playerColor: activeIndices.map(i => entityJSON.playerColor[i]),
                                isBot: activeIndices.map(i => playerJSON.isBot[i]),
                            }
                            playerPackage.ID = newPlayerID
                            sendData(connections[c].peer, "entityData", sentJSON, playerPackage)
                            playerJSON.lastSentTick[playerID] = serverTick
                        }
                    }
                }

                // final
                mspt = performance.now() - frameStart
                msptHistory.push(mspt)
                if (msptHistory.length > 60) msptHistory.shift()
                avgMspt = Math.round((msptHistory.reduce((a, b) => a+b, 0)/msptHistory.length)*1000)/1000

                document.getElementById('mspt-count').textContent = Math.round(mspt*1000)/1000
                document.getElementById('mspt-avg').textContent = avgMspt
            }, 33.33)
        }

        function resetFirebase() {
            setKey(`serverList`, [])
            sendDiscordMessage(`:red_circle: All flingy.io servers closed.`)
        }

        async function closeFirebase() {
            serverList = await getKey(`serverList`)
            if (!serverList) {
                serverList = []
            } else if (typeof serverList === 'string') {
                serverList = [serverList]
            } else if (!Array.isArray(serverList)) {
                serverList = []
            }

            if (!serverList.includes(serverJSON.serverID)) return

            serverList = serverList.filter(s => s !== serverJSON.serverID)
            setKey(`serverList`, serverList)
            setKey(`${serverJSON.serverID}/config`, JSON.stringify(serverJSON))
            setKey(`${serverJSON.serverID}/ULID`, peer.id)
            log(`Server removed from firebase list`)
            sendDiscordMessage(`:red_circle: [${serverJSON.serverID.replace(/^flingy_/, '')}] **${serverJSON.serverName}** server closed! **${serverList.length}** flingy.io servers remain.`)
        }

        async function closeServer() {
            broadcast(`#ff0000`,`Server closed!`)
            closing = true
            closeFirebase()
            for (let i = 0; i < connections.length; i++) {
                disconnectPeer(connections[i].peer, 'Server Closed!')
            }
            running = false
        }

        async function trackServerLifetime() {
            let waitingState = `30min`
            daysToServerClose = daysSince2000() + (serverJSON.serverLifetime/1440)

            while(true) {
                await new Promise(resolve => setTimeout(resolve, 1000))
                if (waitingState == `30min` && (daysToServerClose - daysSince2000()) * 1440 <= 30) {
                    waitingState = `5min`
                    broadcast(`#000000`, `The server will close in 30 minutes!`)
                } else if (waitingState == `5min` && (daysToServerClose - daysSince2000()) * 1440 <= 5) {
                    waitingState = `1min`
                    broadcast(`#000000`, `The server will close in 5 minutes!`)
                } else if (waitingState == `1min` && (daysToServerClose - daysSince2000()) * 1440 <= 1) {
                    waitingState = `30sec`
                    broadcast(`#000000`, `The server will close in 1 minute!`)
                } else if (waitingState == `30sec` && (daysToServerClose - daysSince2000()) * 1440 <= 0.5) {
                    waitingState = `10sec`
                    broadcast(`#000000`, `The server will close in 30 seconds!`)
                } else if (waitingState == `10sec` && (daysToServerClose - daysSince2000()) * 1440 <= 0.166667) {
                    waitingState = `done`
                    closeServer()
                }
            }
        }

        issuesJSON = {lagging: 0, joinable: 0}
        async function trackServerIssues() {
            issuesJSON = {lagging: 0, joinable: 0}
            lastIssuesJSON = {lagging: 0, joinable: 0}
            setInterval(async () => {
                if (issuesJSON.lagging != lastIssuesJSON.lagging) {
                    if (issuesJSON.lagging == 1) {
                        sendDiscordMessage(`:yellow_circle: [${serverJSON.serverID.replace(/^flingy_/, '')}] **${serverJSON.serverName}** server lagging! :(`);
                    } else {
                        sendDiscordMessage(`:green_circle: [${serverJSON.serverID.replace(/^flingy_/, '')}] **${serverJSON.serverName}** server is no longer lagging.`);
                    }
                }
                lastIssuesJSON = JSON.parse(JSON.stringify(issuesJSON))
            }, 1000)
        }

        function trackServerStatus() {
            setInterval(() => {
                const heading = document.querySelector('h1')
                if (!heading) return

                if (running) {
                    if (closing) {
                        heading.textContent = `${serverJSON.serverName} Server - Closing...`
                        heading.style.color = '#ff9966'
                    } else {
                        if (!serverInFirebase) {
                            heading.textContent = `${serverJSON.serverName} Server - Not in Firebase`
                            heading.style.color = '#6696ff'
                        } else if (issuesJSON && (issuesJSON.lagging == 1 || issuesJSON.joinable == 1)) {
                            heading.textContent = `${serverJSON.serverName} Server - Issues`
                            heading.style.color = '#ffc266'
                        } else {
                            heading.textContent = `${serverJSON.serverName} Server`
                            heading.style.color = '#87e65c'
                        }
                    }
                } else {
                    heading.textContent = `${serverJSON?.serverName || 'Flingy.io'} Server`
                    heading.style.color = '#ff6666'
                }
            }, 1000)
        }
    </script>
