<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flingy.io Server</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='red'/%3E%3Ctext x='50' y='72' font-size='70' text-anchor='middle' fill='white' font-family='Arial, sans-serif' font-weight='bold'%3ES%3C/text%3E%3C/svg%3E">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body, button, input, select, h1, h3, #stats, #broadcast-controls, #buttons, #broadcast-controls * {
            font-family: Arial, sans-serif;
        }
        #messages, #messages-container pre {
            font-family: monospace;
        }
        
        /* Theme variables */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #ccc;
            --message-bg: #f9f9f9;
            --stats-bg: #f0f0f0;
            --control-bg: #f8f8f8;
            --input-bg: #ffffff;
            --button-bg: #e0e0e0;
            --button-hover: #d0d0d0;
            --header-color: #000000;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #e0e0e0;
                --border-color: #444;
                --message-bg: #2d2d2d;
                --stats-bg: #333333;
                --control-bg: #2a2a2a;
                --input-bg: #3d3d3d;
                --button-bg: #4a4a4a;
                --button-hover: #5a5a5a;
                --header-color: #ffffff;
            }
        }

        #messages-container {
            height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            padding: 10px;
            background: var(--message-bg);
            margin-bottom: 20px;
            color: var(--text-color);
        }
        
        #messages {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        #stats {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid var(--border-color);
            background: var(--stats-bg);
        }
        
        #broadcast-controls {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid var(--border-color);
            background: var(--control-bg);
        }
        
        #broadcast-controls input, #broadcast-controls button {
            margin: 5px;
            padding: 5px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
        
        button {
            background-color: var(--button-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        
        button:hover {
            background-color: var(--button-hover);
        }
        
        #preset-messages {
            margin: 5px;
            padding: 5px;
            min-width: 200px;
            max-width: 300px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
        
        #broadcast-color-preset option {
            background-color: var(--input-bg);
            color: var(--text-color);
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        h1, h3 {
            color: var(--header-color);
        }
        
        input, select {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Flingy.io Server</h1>
    <p>Server ULID: <span id="peer-id">...</span></p>

    <div id="broadcast-controls">
        <h3>Server Broadcast:</h3>
        <select id="broadcast-color-preset">
            <option value="#ff6666" style="background-color:#ff6666;">🔴 Red</option>
            <option value="#ff9966" style="background-color:#ff9966;">🟠 Orange</option>
            <option value="#ffc266" style="background-color:#ffc266;">🟡 Yellow</option>
            <option value="#87e65c" style="background-color:#87e65c;">🟢 Lime</option>

        <select id="preset-messages">

    <div id="stats">

        <p>MSPT: <span id="mspt-count">0</span> (<span id="mspt-avg">0</span>)</p>
        <p>Players: <span id="player-count">0</span></p>
        <p>Connections: <span id="connection-count">0</span></p>

    <h3>Server Logs:</h3>
    <div id="messages-container">
        <pre id="messages"></pre>
    </div>

    <script>
        // TODO:
        // - kill messages

        document.querySelector('h1').style.color = '#ff6666'

        let presetMessages = [
            {text: "**Dev:** ", color: "#ff6666"},
            {text: "**Notice:** ", color: "#ff9966"},
            {text: "**Note:** If the server is offline, just ping me on Discord or Stoat!", color: "#9966ff"},
            {text: "**Notice:** Servers offline because I am (probably) sleeping", color: "#ff6666"},
            {text: "**Notice:** Server closed. If you want to play, ping @Spin4team4096 in the Discord and I'll bring it up!", color: "#ff6666"},
            {text: "**Note:** Temporarily running server on slower hardware. If the server is laggy/offline, ping @spin4team4096 on Discord!", color: "#6696ff"},
            {text: "**Note:** The developer is playing! (Spin4team4096)", color: "#87e65c"},
            {text: "**Notice:** Servers will restart soon for an update! :D", color: "#ff9966"},
            {text: "**Note:** Server will be back online soon, gimme a min", color: "#ff6666"},
        ]
        
        presetMessages.forEach((preset, index) => {
            let option = document.createElement('option')
            option.value = index;
            option.textContent = preset.text
            document.getElementById('preset-messages').appendChild(option)
        })
        
        document.getElementById('preset-messages').addEventListener('change', function(e) {
            if (e.target.value === '') return
            
            let selectedPreset = presetMessages[e.target.value]
            if (selectedPreset) {
                document.getElementById('broadcast-text').value = selectedPreset.text
                let colorPreset = document.getElementById('broadcast-color-preset')
                let hexInput = document.getElementById('broadcast-color-hex')
                if (Array.from(colorPreset.options).find(opt => opt.value === selectedPreset.color)) {
                    colorPreset.value = selectedPreset.color
                    hexInput.style.display = 'none'
                    hexInput.value = selectedPreset.color
                } else {
                    colorPreset.value = 'custom'
                    hexInput.style.display = 'inline'
                    hexInput.value = selectedPreset.color
                }
            }
            e.target.value = ''
        })

        document.getElementById('broadcast-text').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault()

            }
        })

        document.getElementById('broadcast-color-preset').addEventListener('change', function(e) {
            const hexInput = document.getElementById('broadcast-color-hex')

                hexInput.style.display = 'inline'
                hexInput.value = '#ff6666'
            } else {
                hexInput.style.display = 'none'

        signallingServer = 1
        async function createPeer(server) {
            signallingServer = server
            log(`Trying to connect to Signalling ${signallingServer}`)
            try {setKey(`${serverJSON.serverID}/signalling`, signallingServer.toString())} catch {}
            
            try {
                if (peer) {
                    peer.destroy()
                }
            } catch {}

            switch (server) {
                case 1: 
                    peer = new Peer(undefined, {
                        host: 'peerjs.mikedev101.cc',
                        port: 443,
                        secure: true,
                        config: {
                            iceTransportPolicy: "all",
                            iceServers: [
                                {urls: "stun:vpn.mikedev101.cc:3478"},
                                {urls: "turn:vpn.mikedev101.cc:3478", username: "free", credential: "free"},
                                {urls: "stun:vpn.mikedev101.cc:5349"},
                                {urls: "turn:vpn.mikedev101.cc:5349", username: "free", credential: "free"},
                            ]
                        },
                        debug: 2
                    })
                    break
                case 2:
                    peer = new Peer(undefined, {
                        host: '0.peerjs.com',
                        port: 443,
                        secure: true,
                        config: {
                            iceTransportPolicy: "all",
                            iceServers: [
                                {urls: "stun:stun.l.google.com:19302"},
                                {urls: "stun:stun1.l.google.com:19302"},
                                {urls: "turn:turn1.xirsys.com:443?transport=udp", username: "yourUser", credential: "yourPass"},
                                {urls: "turn:turn1.xirsys.com:443?transport=tcp", username: "yourUser", credential: "yourPass"},
                            ]
                        },
                        debug: 2
                    })
                    break
                default: console.log(`You're stupid, out of bounds`)
            }

            // setup
            peer.on('open', id => {
                peerIdEl.textContent = id
                log(`Connected to PeerJS, Signalling ${signallingServer}, Server ULID: ${id}`)
                setKey(`${serverJSON.serverID}/ULID`, id)
                issuesJSON.joinable = 0
            });

            peer.on('connection', conn => {
                // Check if this PeerID is already connected
                if (connectedPeerIDs.has(conn.peer)) {
                    log(`Rejecting duplicate connection from ${conn.peer} - already connected as player ${connectedPeerIDs.get(conn.peer)}`)
                    conn.on('open', () => {
                        const randomID = randomInt(1000000000000000, 9999999999999999)
                        const message = {
                            opcode: "P_MSG",
                            payload: JSON.stringify(['disconnect', randomID, {}, `Duplicate connection detected`])
                        }
                        
                        conn.send(JSON.stringify(message))
                        setTimeout(() => conn.close(), 100)
                    })
                    
                    return
                }
                
                if (entityJSON.playerActive.filter(active => active === 1).length >= serverJSON.playerLimit) {
                    log(`Rejecting connection from ${conn.peer} - server full`)
                    conn.on('open', () => {
                        const randomID = randomInt(1000000000000000, 9999999999999999)
                        const message = {
                            opcode: "P_MSG",
                            payload: JSON.stringify(['disconnect', randomID, {}, `Server exceeded player limit of ${serverJSON.playerLimit}`])
                        }
                        
                        conn.send(JSON.stringify(message))
                        setTimeout(() => conn.close(), 100)
                    })
                    
                    return
                }
                
                let playerID = -1
                for (let i = 0; i < serverJSON.playerLimit; i++) {
                    if (entityJSON.playerActive[i] == 0) {
                        playerID = i
                        break
                    }
                }            
                if (playerID === -1) {
                    log(`Rejecting connection from ${conn.peer} - no available slots`)
                    conn.on('open', () => {
                        const randomID = randomInt(1000000000000000, 9999999999999999)
                        const message = {
                            opcode: "P_MSG",
                            payload: JSON.stringify(['disconnect', randomID, {}, `Server exceeded player limit of ${serverJSON.playerLimit}`])
                        }
                        
                        conn.send(JSON.stringify(message))
                        setTimeout(() => conn.close(), 100)
                    })
                    
                    return
                }
                entityJSON.playerActive[playerID] = 1
                playerJSON.lastUpdate[playerID] = -1
                initializePlayer(playerID, conn.peer);
                
                log(`${conn.peer} joined as player ${playerID}!`)
                sound(444, 666); setTimeout(() => sound(544, 666), 100)
                
                conn.playerID = playerID
                connections.push(conn)
                
                // Track the PeerID
                connectedPeerIDs.set(conn.peer, playerID)
                setKey(`${serverJSON.serverID}/playerCount`, entityJSON.playerActive.filter(a => a == 1).length)

                conn.on('data', (data) => {
                    try {
                        const message = JSON.parse(data)
                        if (message.opcode === "P_MSG") {
                            const [type, randomID, receivedPlayerID, receivedPackage] = JSON.parse(message.payload)
                            
                            const actualPlayerID = conn.playerID
                            if (type === "spawnPlayer") {
                                if (!closing) initializePlayer(actualPlayerID, conn.peer)
                            } else if (type == "playerUpdate") {
                                playerJSON.lastUpdate[actualPlayerID] = 0
                                entityJSON.playerWorldMouseX[actualPlayerID] = receivedPackage.worldMouseX
                                entityJSON.playerWorldMouseY[actualPlayerID] = receivedPackage.worldMouseY
                                if (receivedPackage.serverTick > playerJSON.serverTick[actualPlayerID]) playerJSON.serverTick[actualPlayerID] = receivedPackage.serverTick
                                playerJSON.menu[actualPlayerID] = receivedPackage.menu
                                playerJSON.deathScreen[actualPlayerID] = receivedPackage.deathScreen
                                playerJSON.cameraX[actualPlayerID] = receivedPackage.cameraX
                                playerJSON.cameraY[actualPlayerID] = receivedPackage.cameraY
                                entityJSON.playerUsername[actualPlayerID] = receivedPackage.username
                                playerJSON.leftMouseDown[actualPlayerID] = receivedPackage.leftMouseDown
                            }
                        }
                    } catch (err) {
                        console.log('Parse error:', err)
                    }
                })

                conn.on('close', () => {
                    log(`${conn.peer} (player ${conn.playerID}) left.`)
                    sound(444, 666); setTimeout(() => sound(400, 666), 100)
                    clearPlayerSlot(conn.playerID)
                    connections = connections.filter(c => c !== conn)
                    connectedPeerIDs.delete(conn.peer)
                    setKey(`${serverJSON.serverID}/playerCount`, entityJSON.playerActive.filter(a => a == 1).length)
                })
            })

            peer.on('error', err => {
                log(`Error: ${err.type} (${err.message})`)
                if (err.type === 'network' || err.type === 'disconnected') {
                    issuesJSON.joinable = 1
                }
            })

            peer.on('disconnected', () => {issuesJSON.joinable = 1})
        }

        const app = firebase.initializeApp({
            databaseURL: "https://spinbase4096-default-rtdb.europe-west1.firebasedatabase.app/"
        })
        const database = firebase.database();

        const messages = document.getElementById('messages')
        const peerIdEl = document.getElementById('peer-id')
        let connections = []
        let connectedPeerIDs = new Map()

        let fps = 0
        let frameCount = 0
        let lastFpsUpdate = Date.now()

        // Helper Functions

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function sound(freq = 440, dur = 200) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            let t = audioCtx.currentTime;
            let end = t + dur/1000;

            osc.type = 'sine';
            osc.frequency.value = freq;

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.3, t+0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, end);

            osc.start(t);
            osc.stop(end);
            
            osc.onended = () => {
                osc.disconnect();
                gain.disconnect();
            };
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                let jj = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[jj]] = [arr[jj], arr[i]];
            }
        }
        
        function degToRad(degrees) {
            return degrees * (Math.PI / 180)
        }

        function radToDeg(radians) {
            return radians * (180 / Math.PI)
        }

        function directionTo(newx, newy, oldx, oldy) {
            return radToDeg(Math.atan2(newy - oldy, newx - oldx))
        }

        function distanceTo(newx, newy, oldx, oldy) {
            return Math.sqrt((newx - oldx) ** 2 + (newy - oldy) ** 2)
        }

        function daysSince2000() {
            const startDate = new Date('2000-01-01T00:00:00Z')
            const currentDate = new Date()
            const diffTime = currentDate - startDate
            return diffTime/(1000*60*60*24)
        }

        function getDate() {
            let d = new Date()
            let day = d.getDate().toString().padStart(2, '0')
            let month = (d.getMonth() + 1).toString().padStart(2, '0')
            let year = d.getFullYear().toString()
            return `${day}/${month}/${year}`
        }

        function randomInt(num1, num2) {return Math.floor(Math.random() * (Math.max(num1, num2) - Math.min(num1, num2) + 1)) + Math.min(num1, num2)}
        function randomFloat(num1, num2) {return Math.random() * (Math.max(num1, num2) - Math.min(num1, num2)) + Math.min(num1, num2)}

        function waitUntil(condition, interval = 100) {
            return new Promise(resolve => {
                const check = () => {
                    if (condition()) {
                        resolve()
                    } else {
                        setTimeout(check, interval)
                    }
                }
                check()
            })
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value))
        }

        // Specific Functions

        function setKey(key, value, path = 'flingy/servers') {
            database.ref(`${path}/${key}`).set(value)
        }

        async function getKey(key, path = 'flingy/servers') {
            const snapshot = await database.ref(`${path}/${key}`).once('value')
            return snapshot.val()
        }

        function log(text) {
            const now = new Date()
            const timeString = now.toLocaleTimeString() + '.' + now.getMilliseconds().toString().padStart(3, '0')
            messages.textContent += `[${timeString}] ${text}\n`
            const container = document.getElementById('messages-container')
            container.scrollTop = container.scrollHeight
        }

        function sendData(peerID, type, data, data2, data3, data4, data5) {
            const randomID = randomInt(1000000000000000, 9999999999999999)
            const message = {
                opcode: "P_MSG",
                payload: JSON.stringify([type, randomID, data, data2, data3, data4, data5])
            }
            const connection = connections.find(conn => conn.peer === peerID)

            if (connection && connection.open) {
                connection.send(JSON.stringify(message))
                return true
            } else {
                return false
            }
        }

        function disconnectPeer(peerID, reason = "Disconnected by server") {
            const connection = connections.find(conn => conn.peer === peerID)
            
            if (connection && connection.open) {
                sendData(peerID, 'disconnect', {}, reason)
                setTimeout(() => {
                    connection.close()
                    connections = connections.filter(conn => conn.peer !== peerID)
                    log(`Disconnected peer ${peerID}: ${reason}`)
                    sound(444, 666); setTimeout(() => sound(400, 666), 100)
                }, 100)
                return true
            }
            return false
        }

        function broadcast(color, text) {
            entityJSON.serverNotification.color = color
            entityJSON.serverNotification.text = text
            entityJSON.serverNotification.id = serverTick.toString()
            while (entityJSON.serverNotification.id.length < 9) {
                entityJSON.serverNotification.id = `${entityJSON.serverNotification.id}${randomInt(0,9)}`
            }
            entityJSON.serverNotification.id = Number(entityJSON.serverNotification.id.slice(0,9))
            log(`Broadcasted: ${text} (Color: ${color})`)
        }

        function sendPrivateNotification(targetPlayerID, color, text) {
            const connection = connections.filter(c => c.playerID === targetPlayerID).pop()
            if (connection && connection.open) {
                playerPackage = {
                    text: text,
                    color: color,
                }
                sendData(connection.peer, 'sendNotification', {}, playerPackage)
                log(`Sent private notification to player ${targetPlayerID}: "${text}"`)
            }
        }

        function updateConfig() {
            playerPackage = {
                serverJSON: serverJSON
            }
            connections.forEach(connection => {
                if (connection && connection.open) {
                    sendData(connection.peer, 'updateConfig', {}, playerPackage)
                }
            })
            setKey(`${serverJSON.serverID}/config`, JSON.stringify(serverJSON))
        }

        function initializePlayer(playerID, peerID) {
            entityJSON.playerID[playerID] = peerID
            entityJSON.playerActive[playerID] = 1
            entityJSON.playerAlive[playerID] = 1
            entityJSON.playerHP[playerID] = 3
            entityJSON.playerUsername[playerID] = 'unnamed'

            entityJSON.playerSpeedX[playerID] = 0
            entityJSON.playerSpeedY[playerID] = 0
            entityJSON.playerSize[playerID] = 5
            entityJSON.playerFlailX[playerID] = entityJSON.playerX[playerID]
            entityJSON.playerFlailY[playerID] = entityJSON.playerY[playerID]

            entityJSON.playerWorldMouseX[playerID] = 0
            entityJSON.playerWorldMouseY[playerID] = 0
            entityJSON.playerRank[playerID] = 0
                    
            playerJSON.lastUpdate[playerID] = -1
            playerJSON.serverTick[playerID] = 0
            playerJSON.lastSentTick[playerID] = 0
            playerJSON.menu[playerID] = 1
            playerJSON.deathScreen[playerID] = 0
            playerJSON.cameraX[playerID] = 0
            playerJSON.cameraY[playerID] = 0
            playerJSON.leftMouseDown[playerID] = 0
            playerJSON.timeUntilRespawn[playerID] = 0
        }

        function clearPlayerSlot(playerID) {
            entityJSON.playerID[playerID] = ''
            entityJSON.playerActive[playerID] = 0
            entityJSON.playerAlive[playerID] = 0
            entityJSON.playerHP[playerID] = 0
            entityJSON.playerUsername[playerID] = 'unnamed'
            entityJSON.playerX[playerID] = 0
            entityJSON.playerY[playerID] = 0
            entityJSON.playerSpeedX[playerID] = 0
            entityJSON.playerSpeedY[playerID] = 0
            entityJSON.playerSize[playerID] = 5

                        reconnectionAttempts += 1

                    'connected to peerjs',
                    'loaded entities',
                    'signalling',
                    'server',
                    'error',
                    'network',

                const removePhrases = [
                    'broadcasted',
                    'status',
                    'clipboard',
                ]
                if (removePhrases.some(phrase => lowerLine.includes(phrase))) {
                    return false
                }
                return keepPhrases.some(phrase => lowerLine.includes(phrase))

                entityJSON.playerDirection.push(0)
                entityJSON.playerAngularVelocity.push(0)
                entityJSON.playerWorldMouseX.push(0)

                playerJSON.lastUpdate.push(-1)
                playerJSON.serverTick.push(0)

                playerJSON.menu.push(1)
                playerJSON.deathScreen.push(0)
                playerJSON.cameraX.push(0)
                playerJSON.cameraY.push(0)

            }

            let serverList = await getKey(`serverList`)
            if (!serverList) {

            } else if (typeof serverList === 'string') {
                serverList = [serverList]
            } else if (!Array.isArray(serverList)) {
                serverList = []
            }
            if (serverList.includes(serverJSON.serverID)) {log(`Server ID already exists!`); throw new Error('Stopped')}

            log(`Server added to firebase list`)

            gameStatus = 0
            stateTick = 0

            // Core loop
            steps = 10
            fpsHistory = []

            msptHistory = []
            avgMspt = 0
            trackServerLifetime()
            trackServerIssues()
            trackServerStatus()
            log(`Server Started!`)
            sendDiscordMessage(`:green_circle: ${serverJSON.playerLimit}-player **${serverJSON.serverName}** server started! **${serverList.length}** total flingy.io servers now.`)

            running = true
            closing = false
            serverTick = 0
            const intervalID = setInterval(() => {
                if (!running) {
                    clearInterval(intervalID)
                    return
                }

                serverTick++
                entityJSON.serverTick = serverTick

                let frameStart = performance.now()

                // Update server stats
                frameCount++
                const now = Date.now()
                if (now-lastFpsUpdate >= 1000) {
                    fps = Math.round((frameCount*1000)/(now-lastFpsUpdate))
                    fpsHistory.push(fps)
                    if (fpsHistory.length > 30) fpsHistory.shift()
                    avgFps = fpsHistory.reduce((a, b) => a+b, 0)/fpsHistory.length
                    
                    document.getElementById('fps-count').textContent = fps
                    document.getElementById('fps-avg').textContent = avgFps.toFixed(2)
                    
                    frameCount = 0
                    lastFpsUpdate = now
                }
                if (fpsHistory.length >= 30) {
                    avgFps = fpsHistory.reduce((a, b) => a+b, 0)/fpsHistory.length
                    issuesJSON.lagging = avgFps < 27.5 ? 1 : 0
                }

                document.getElementById('player-count').textContent = entityJSON.playerActive.filter(active => active === 1).length
                document.getElementById('connection-count').textContent = connections.filter(c => c.open).length
                issuesJSON.full = entityJSON.playerActive.filter(active => active === 1).length >= serverJSON.playerLimit ? 1 : 0

                // matchmaking + physics
                let activePlayers = entityJSON.playerActive.filter(a => a == 1).length
                let alivePlayers = entityJSON.playerHP.filter((a, i) => a > 0 && entityJSON.playerActive[i] == 1).length

                if (gameStatus == 0) {
                    // waiting for players
                    entityJSON.borderSize = serverJSON.borderSize
                    if (activePlayers >= 2) {
                        gameStatus = 1
                        stateTick = serverTick+120*30
                        checkAndAdjustCountdown()
                        broadcast('#6696ff', `Game starting soon... (${activePlayers}/${serverJSON.playerLimit})`)
                    }
                } else if (gameStatus == 1) {
                    // countdown - 30 seconds or until full
                    entityJSON.borderSize = serverJSON.borderSize
                    if (activePlayers < 2) {
                        gameStatus = 0
                        stateTick = serverTick
                        broadcast('#ff6666', `Not enough players. Waiting for more...`)
                    } else if (activePlayers >= serverJSON.playerLimit || serverTick >= stateTick) {
                        gameStatus = 2
                        stateTick = serverTick
                        for (let i=0; i < serverJSON.playerLimit; i++) {
                            entityJSON.playerFlailSize[i] = 5
                        }
                        broadcast('#2d8f2d', `Game started! GO FLING THOSE FLAILS!!!`)
                        setKey(`${serverJSON.serverID}/status`, '1')
                    }
                } else if (gameStatus == 2) {
                    // playing - pvp on
                    entityJSON.borderSize = clamp(entityJSON.borderSize-0.10, 100, serverJSON.borderSize)
                    if (entityJSON.borderSize <= 100 && gameStatus == 2) {
                        for (let i=0; i < serverJSON.playerLimit; i++) {
                            if (entityJSON.playerAlive[i] == 1) {
                                entityJSON.playerHP[i] -= 1/((10+entityJSON.playerFlailSize[i]/100*10)*30)
                                if (entityJSON.playerHP[i] <= 0) {
                                    entityJSON.playerHP[i] = 0
                                    entityJSON.playerAlive[i] = 0
                                    entityJSON.playerRank[i] = entityJSON.playerHP.filter((hp, idx) => hp > 0 && entityJSON.playerAlive[idx] == 1).length+1
                                }
                            }
                        }
                    }
                    // add collision detection and player elimination logic here

                    if (alivePlayers <= 1) {
                        gameStatus = 3
                        stateTick = serverTick+7*30
                        broadcast('#ff9966', `Game over! Restarting soon...`)
                    }
                } else if (gameStatus == 3) {
                    // ending
                    if (serverTick >= stateTick) {
                        let connsToClose = connections.slice()
                        for (let i = 0; i < connsToClose.length; i++) {
                            try {
                                sendData(connsToClose[i].peer, 'disconnect', {}, 'Game over!')
                                connsToClose[i].close()
                            } catch {}
                        }
                        connections = []
                        connectedPeerIDs.clear()
                        for (let i = 0; i < serverJSON.playerLimit; i++) {
                            clearPlayerSlot(i)
                        }
                        gameStatus = 0
                        entityJSON.borderSize = serverJSON.borderSize
                        stateTick = serverTick
                        setKey(`${serverJSON.serverID}/status`, '0')
                        setKey(`${serverJSON.serverID}/playerCount`, 0)
                        broadcast('#ff9966', `Waiting for players...`)
                    }
                }

                if (serverTick % (30*7) == 0) {
                    let activePlayers = entityJSON.playerActive.filter(a => a == 1).length
                    if (gameStatus == 0) {
                        broadcast('#ff9966', `Waiting for players... (${activePlayers}/${serverJSON.playerLimit})`)
                    } else if (gameStatus == 1) {
                        let remaining = Math.ceil((stateTick-serverTick)/30)
                        if (remaining > 0) {
                            broadcast('#6696ff', `Game starting in ${remaining} seconds... (${activePlayers}/${serverJSON.playerLimit})`)
                        }
                    }
                }

                // player movement
                deadzone = 30
                accel = 0.3

                for (let i=0; i < serverJSON.playerLimit; i++) {
                    if (entityJSON.playerAlive[i] == 1) {
                        // controls
                        if (entityJSON.playerFlailConnected[i] == 1 && playerJSON.leftMouseDown[i] == true && gameStatus == 2) {
                            entityJSON.playerFlailConnected[i] = 0
                        }
                        // player movement
                        //let oldDirection = entityJSON.playerDirection[i]
                        //entityJSON.playerDirection[i] += (diff = directionTo(entityJSON.playerWorldMouseX[i], entityJSON.playerWorldMouseY[i], entityJSON.playerX[i], entityJSON.playerY[i])-entityJSON.playerDirection[i], diff = ((diff%360)+540)%360-180, diff/5)
                        //entityJSON.playerAngularVelocity[i] = entityJSON.playerDirection[i]-oldDirection
                        let rawDiff = directionTo(entityJSON.playerWorldMouseX[i], entityJSON.playerWorldMouseY[i], entityJSON.playerX[i], entityJSON.playerY[i]) - entityJSON.playerDirection[i]
                        let diff = Math.atan2(Math.sin(rawDiff * Math.PI / 180), Math.cos(rawDiff * Math.PI / 180)) * 180 / Math.PI
                        entityJSON.playerAngularVelocity[i] = entityJSON.playerAngularVelocity[i] * (entityJSON.playerFlailConnected[i] == 1 ? 0.9 : 0.5) + diff * 0.03 / (entityJSON.playerFlailConnected[i] == 1 ? (1 + Math.sqrt(entityJSON.playerFlailSize[i]) / 10) : 0.5)
                        entityJSON.playerDirection[i] += entityJSON.playerAngularVelocity[i]
                        if (entityJSON.playerFlailConnected[i] == 1) entityJSON.playerFlailSize[i] += Math.abs(entityJSON.playerAngularVelocity[i])/50
                        if (entityJSON.playerFlailConnected[i] == 1) {
                            entityJSON.playerFlailSize[i] = clamp(entityJSON.playerFlailSize[i]-0.1, 5, 100)
                        } else {
                            if (entityJSON.playerFlailSize[i] > 5) {
                                entityJSON.playerFlailSize[i] = clamp(entityJSON.playerFlailSize[i]-0.3, 0, 100)
                            } else {
                                entityJSON.playerFlailSize[i] = clamp(entityJSON.playerFlailSize[i]-0.1, 0, 100)
                            }
                            if (entityJSON.playerFlailSize[i] <= 0 || Math.sqrt((entityJSON.playerFlailSpeedX[i]**2)+(entityJSON.playerFlailSpeedY[i]**2)) < 0.5) {
                                entityJSON.playerFlailConnected[i] = 1
                            }
                        }

                        if (distanceTo(entityJSON.playerWorldMouseX[i], entityJSON.playerWorldMouseY[i], entityJSON.playerX[i], entityJSON.playerY[i]) > 25) {
                            entityJSON.playerSpeedX[i] += Math.cos(degToRad(entityJSON.playerDirection[i]))*accel
                            entityJSON.playerSpeedY[i] += Math.sin(degToRad(entityJSON.playerDirection[i]))*accel
                        }
                        entityJSON.playerSpeedX[i] *= 0.92
                        entityJSON.playerSpeedY[i] *= 0.92

                        entityJSON.playerX[i] += entityJSON.playerSpeedX[i]
                        entityJSON.playerY[i] += entityJSON.playerSpeedY[i]
                        entityJSON.playerX[i] = clamp(entityJSON.playerX[i], -entityJSON.borderSize+entityJSON.playerSize[i]/2, entityJSON.borderSize-entityJSON.playerSize[i]/2)
                        entityJSON.playerY[i] = clamp(entityJSON.playerY[i], -entityJSON.borderSize+entityJSON.playerSize[i]/2, entityJSON.borderSize-entityJSON.playerSize[i]/2)
                        
                        // flail movement
                        if (entityJSON.playerFlailConnected[i] == 1) {
                            let oldFlailX = entityJSON.playerFlailX[i]
                            let oldFlailY = entityJSON.playerFlailY[i]
                            entityJSON.playerFlailX[i] = entityJSON.playerX[i]+(Math.cos(degToRad(entityJSON.playerDirection[i])))*(20+entityJSON.playerSize[i]/2+entityJSON.playerFlailSize[i]/2)
                            entityJSON.playerFlailY[i] = entityJSON.playerY[i]+(Math.sin(degToRad(entityJSON.playerDirection[i])))*(20+entityJSON.playerSize[i]/2+entityJSON.playerFlailSize[i]/2)
                            entityJSON.playerFlailSpeedX[i] = entityJSON.playerFlailX[i]-oldFlailX
                            entityJSON.playerFlailSpeedY[i] = entityJSON.playerFlailY[i]-oldFlailY
                        } else {
                            entityJSON.playerFlailSpeedX[i] *= 0.96
                            entityJSON.playerFlailSpeedY[i] *= 0.96
                            entityJSON.playerFlailX[i] += entityJSON.playerFlailSpeedX[i]
                            entityJSON.playerFlailY[i] += entityJSON.playerFlailSpeedY[i]
                        }
                        entityJSON.playerFlailX[i] = clamp(entityJSON.playerFlailX[i], -entityJSON.borderSize-entityJSON.playerFlailSize[i]/2, entityJSON.borderSize+entityJSON.playerFlailSize[i]/2)
                        entityJSON.playerFlailY[i] = clamp(entityJSON.playerFlailY[i], -entityJSON.borderSize-entityJSON.playerFlailSize[i]/2, entityJSON.borderSize+entityJSON.playerFlailSize[i]/2)

                        // collision
                        for (let p=0; p < entityJSON.playerX.length; p++) {
                            if (distanceTo(entityJSON.playerX[p], entityJSON.playerY[p], entityJSON.playerFlailX[i], entityJSON.playerFlailY[i]) <= (entityJSON.playerSize[p]/2)+(entityJSON.playerFlailSize[i]/2) && entityJSON.playerAlive[p] == 1) {
                                if (p == i) {
                                    entityJSON.playerFlailConnected[i] = 1
                                } else if (gameStatus == 2) {
                                    entityJSON.playerHP[p] -= 1
                                    entityJSON.playerAlive[p] = 0
                                    playerJSON.timeUntilRespawn[i] = 90
                                    if (entityJSON.playerHP[p] <= 0) {
                                        entityJSON.playerRank[p] = (entityJSON.playerHP.filter((hp, idx) => hp > 0 && entityJSON.playerAlive[idx] == 1).length)+1
                                    }
                                }
                            }
                        }
                    } else if (entityJSON.playerHP[i] > 0) {
                        playerJSON.timeUntilRespawn[i] -= 1
                        if (playerJSON.timeUntilRespawn[i] <= 0) {
                            entityJSON.playerAlive[i] = 1
                            entityJSON.playerX[i] = randomInt(-entityJSON.borderSize,entityJSON.borderSize)
                            entityJSON.playerY[i] = randomInt(-entityJSON.borderSize,entityJSON.borderSize)
                            entityJSON.playerFlailSize[i] = 0
                            entityJSON.playerFlailConnected[i] = 1
                        }
                    } else {
                        // out for good, cam't do anything
                    }
                }

                // send data to all players
                if (connections.length > 0) {
                    for (let c = 0; c < connections.length; c++) {
                        let playerID = connections[c].playerID
                        let playerPackage = {
                            ID: playerID,
                            tps: fps
                        }
                        
                        let clientTick = Number(playerJSON.serverTick[playerID]) || 0
                        let framesBehind = serverTick-clientTick
                        let framesPerUpdate = Math.ceil(clamp((framesBehind-2)/5, 1, 100))
                        
                        if (!playerJSON.lastSentTick[playerID]) playerJSON.lastSentTick[playerID] = 0
                        
                        if (serverTick % framesPerUpdate == 0) {
                            sendData(connections[c].peer, "entityData", entityJSON, playerPackage)
                            playerJSON.lastSentTick[playerID] = serverTick
                        }
                    }
                }

                // final
                mspt = performance.now() - frameStart
                msptHistory.push(mspt)
                if (msptHistory.length > 60) msptHistory.shift()
                avgMspt = Math.round((msptHistory.reduce((a, b) => a+b, 0)/msptHistory.length)*1000)/1000

                document.getElementById('mspt-count').textContent = Math.round(mspt*1000)/1000
                document.getElementById('mspt-avg').textContent = avgMspt
            }, 33.33)
        }

        function resetFirebase() {
            setKey(`serverList`, [])

        async function closeFirebase() {
            let serverList = await getKey(`serverList`)
            if (!serverList) {
                serverList = []
            } else if (typeof serverList === 'string') {
                serverList = [serverList]
            } else if (!Array.isArray(serverList)) {
                serverList = []
            }

            if (!serverList.includes(serverJSON.serverID)) return

            serverList = serverList.filter(s => s !== serverJSON.serverID)
            setKey(`serverList`, serverList)
            setKey(`${serverJSON.serverID}/config`, JSON.stringify(serverJSON))
            setKey(`${serverJSON.serverID}/ULID`, peer.id)
            log(`Server removed from firebase list`)
            sendDiscordMessage(`:red_circle: **${serverJSON.serverName}** server closed! **${serverList.length}** flingy.io servers remain.`)
        }

        async function closeServer() {
            broadcast(`#ff0000`,`Server closed!`)
            closing = true
            closeFirebase()
            for (let i = 0; i < connections.length; i++) {
                disconnectPeer(connections[i].peer, 'Server Closed!')
            }
            running = false
        }

        async function trackServerLifetime() {
            let waitingState = `30min`
            daysToServerClose = daysSince2000() + (serverJSON.serverLifetime/1440)

            while(true) {
                await new Promise(resolve => setTimeout(resolve, 1000))
                if (waitingState == `30min` && (daysToServerClose - daysSince2000()) * 1440 <= 30) {
                    waitingState = `5min`
                    broadcast(`#000000`, `The server will close in 30 minutes!`)
                } else if (waitingState == `5min` && (daysToServerClose - daysSince2000()) * 1440 <= 5) {
                    waitingState = `1min`
                    broadcast(`#000000`, `The server will close in 5 minutes!`)
                } else if (waitingState == `1min` && (daysToServerClose - daysSince2000()) * 1440 <= 1) {
                    waitingState = `30sec`
                    broadcast(`#000000`, `The server will close in 1 minute!`)
                } else if (waitingState == `30sec` && (daysToServerClose - daysSince2000()) * 1440 <= 0.5) {
                    waitingState = `10sec`
                    broadcast(`#000000`, `The server will close in 30 seconds!`)
                } else if (waitingState == `10sec` && (daysToServerClose - daysSince2000()) * 1440 <= 0.166667) {
                    waitingState = `done`
                    closeServer()
                }
            }
        }

            issuesJSON = {lagging: 0, joinable: 0, full: 0}

            setInterval(async () => {
                if (issuesJSON.lagging != lastIssuesJSON.lagging) {

                        sendDiscordMessage(`:green_circle: **${serverJSON.serverName}** server is no longer lagging.`);
                    }
                }
                
                if (issuesJSON.full != lastIssuesJSON.full) {
                    if (issuesJSON.full == 1) {
                        sendDiscordMessage(`:yellow_circle: **${serverJSON.serverName}** server full!`);
                    } else {
                        sendDiscordMessage(`:green_circle: **${serverJSON.serverName}** server is no longer full.`);
                    }
                }

                lastIssuesJSON = JSON.parse(JSON.stringify(issuesJSON))
            }, 1000)
        }

        function trackServerStatus() {
            setInterval(async () => {
                const heading = document.querySelector('h1')
                if (!heading) return
                
                if (running) {
                    if (closing) {
                        heading.textContent = `${serverJSON.serverName} Server - Closing...`
                        heading.style.color = '#ff9966'
                    } else {
                        let serverList = await getKey(`serverList`)
                        
                        if (!serverList || !((Array.isArray(serverList) && serverList.includes(serverJSON?.serverID)) || serverList === serverJSON?.serverID)) {
                            heading.textContent = `${serverJSON.serverName} Server - Not in Firebase`
                            heading.style.color = '#6696ff'
                        } else if (issuesJSON && (issuesJSON.lagging === 1 || issuesJSON.joinable === 1 || issuesJSON.full === 1)) {
                            heading.textContent = `${serverJSON.serverName} Server - Issues`
                            heading.style.color = '#ffc266'
                        } else {
                            heading.textContent = `${serverJSON.serverName} Server`
                            heading.style.color = '#87e65c'
                        }
                    }
                } else {
                    heading.textContent = `${serverJSON?.serverName || 'Flingy.io'} Server`
                    heading.style.color = '#ff6666'
                }
            }, 1000)
        }

        async function getAvailableServerCount() {
            try {
                let list = await getKey('serverList')
                if (!list || !Array.isArray(list)) return 1
                let statuses = await Promise.all(list.map(id => getKey(`${id}/status`)))
                return statuses.filter(s => s === '0').length
            } catch {
                return 1
            }
        }

        async function checkAndAdjustCountdown() {
            if (gameStatus != 1) return
            try {
                let availableCount = await getAvailableServerCount()
                if (availableCount > 1) {
                    let maxEndTick = serverTick+30*30
                    if (stateTick > maxEndTick) stateTick = maxEndTick
                }
            } catch {}
            setTimeout(() => checkAndAdjustCountdown(), 1000)
        }
