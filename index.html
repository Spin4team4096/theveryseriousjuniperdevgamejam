        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {

        function shortNumber(n) {
            if (n < 1000) return ''+n
            
            let units = ['k','m','b','t']
            let u = -1
            
            while (n >= 1000 && u < units.length - 1) {
                n /= 1000
                u++
            }
            
            let dp = n >= 100 ? 0 : n >= 10 ? 1 : 2
            return +(n.toFixed(dp))+units[u]
        }

        function formatTime(seconds) {
            let mins = Math.floor(Math.max(0, seconds)/60)

            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`
        }

        function wrapWords(text, maxWidth) {
            if (!text || typeof text != 'string') {return 'null'}
            
            // Split on literal \n first (with optional spaces)
            const segments = text.split(/\s*\\n\s*/)
            let allLines = []
            
            ctx.save()
            ctx.font = `10px Arial`
            
            for (let segment of segments) {
                if (segment === '') continue
                
                let lines = []
                let currentLine = ''
                let words = segment.split(' ')
                
                words.forEach(word => {
                    let cleanWord = removeMarkdown(word)
                    let wordWidth = ctx.measureText(cleanWord).width
                    
                    if (wordWidth > maxWidth) {
                        if (currentLine) {
                            lines.push(currentLine)
                            currentLine = ''
                        }
                        
                        let partialWord = ''
                        let partialClean = ''
                        
                        for (let i = 0; i < word.length; i++) {
                            partialWord += word[i]
                            partialClean = removeMarkdown(partialWord)
                            
                            if (ctx.measureText(partialClean).width > maxWidth) {
                                let lastChar = partialWord.slice(-1)
                                partialWord = partialWord.slice(0,-1)
                                
                                if (partialWord) lines.push(partialWord)
                                
                                partialWord = lastChar
                            }
                        }
                        
                        if (partialWord) lines.push(partialWord)
                    } else {
                        let testLine = currentLine ? currentLine + ' ' + word : word
                        let cleanTest = removeMarkdown(testLine)
                        
                        if (ctx.measureText(cleanTest).width <= maxWidth) {
                            currentLine = testLine
                        } else {
                            if (currentLine) lines.push(currentLine)
                            currentLine = word
                        }
                    }
                })
                
                if (currentLine) lines.push(currentLine)
                allLines.push(...lines)
            }
            
            ctx.restore()
            return allLines.join('\n')
        }

        function removeMarkdown(text) {
            return text
                .replace(/\*\*\*(.*?)\*\*\*/g, '$1')
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/\*(.*?)\*/g, '$1')
        }

        function toHex(num) {

        }

        function interpolateColors(color1, color2, weight) {
            weight = Math.max(0, Math.min(1, weight))
            
            const r1 = parseInt(color1.slice(1,3),16)
            const g1 = parseInt(color1.slice(3,5),16)
            const b1 = parseInt(color1.slice(5,7),16)
            
            const r2 = parseInt(color2.slice(1,3),16)
            const g2 = parseInt(color2.slice(3,5),16)
            const b2 = parseInt(color2.slice(5,7),16)
            
            const r = Math.round(r1+(r2-r1)*weight)
            const g = Math.round(g1+(g2-g1)*weight)
            const b = Math.round(b1+(b2-b1)*weight)
            
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`
        }

        function degToRad(degrees) {
            return degrees*(Math.PI/180)

        function radToDeg(radians) {
            return radians*(180/Math.PI)
        }

        function directionTo(newx, newy, oldx, oldy) {
            return radToDeg(Math.atan2(newy-oldy, newx-oldx))
        }

        function distanceTo(newx, newy, oldx, oldy) {
            return Math.sqrt((newx-oldx)**2+(newy-oldy)**2)
        }

        function daysSince2000() {
            const startDate = new Date('2000-01-01T00:00:00Z')
            const currentDate = new Date()
            const diffTime = currentDate - startDate

        }

        function waitUntil(condition, interval = 100) {
            return new Promise(resolve => {

                    if (condition()) {

        // Drawing Functions
        function drawRect(x,y,sizex,sizey,dir,fill,outline,thickness) {
            ctx.fillStyle = fill
            ctx.strokeStyle = outline
            ctx.lineWidth = thickness

            ctx.save()
            ctx.translate(x, y)
            ctx.rotate(degToRad(dir))
            ctx.fillRect(0-(sizex/2), 0-(sizey/2), sizex, sizey,)
            if (thickness > 0) ctx.strokeRect(0-(sizex/2), 0-(sizey/2), sizex, sizey,)
            ctx.restore()

        }

        function drawRectHTML(element, x, y, sizex, sizey, dir, fill, outline, thickness) {
            const canvasRect = canvas.getBoundingClientRect()
            const centerX = canvasRect.width / 2
            const centerY = canvasRect.height / 2
            
            const screenX = Math.round(centerX + (x * scale))
            const screenY = Math.round(centerY + (y * scale))
            const screenWidth = Math.round(sizex * scale)
            const screenHeight = Math.round(sizey * scale)
            
            element.style.left = (screenX - Math.round(screenWidth/2)) + 'px'
            element.style.top = (screenY - Math.round(screenHeight/2)) + 'px'
            element.style.width = screenWidth + 'px'
            element.style.height = screenHeight + 'px'
            
            element.style.backgroundColor = fill || 'transparent'

            element.style.transform = `rotate(${dir}deg)`
            element.style.boxSizing = 'border-box'
            element.style.margin = '0'
            element.style.padding = '0'
            element.style.position = 'absolute'
            
            if (element.tagName === 'INPUT') {
                element.style.textAlign = 'center'
            }
        }

        function drawShape(x, y, radius, sides, dir, fill, outline, thickness, offset = false) {
            ctx.fillStyle = fill
            ctx.strokeStyle = outline
            ctx.lineWidth = thickness

            ctx.save()
            ctx.translate(x, y)
            ctx.rotate(degToRad(dir))

            
            if (offset == 'rock') {
                offset = []
                offset.push(sides)
                switch (sides) {
                    case 6: offset = [0.901, 0.783, 0.714, 0.892, 0.800, 1.000] ;break
                    case 7: offset = [0.938, 0.843, 0.931, 0.986, 1.000, 0.998, 0.915] ;break
                    case 8: offset = [0.923, 0.834, 0.989, 0.846, 0.921, 0.922, 1.000, 0.968] ;break
                }
            } else if (offset == 'boss') {
                offset = [0.95, 1, 0.97, 0.93, 0.99, 0.96, 0.94, 0.98]
            }

            ctx.beginPath()
            for (let i = 0; i < sides; i++) {
                const angle = (i/sides)*Math.PI*2
                const effectiveRadius = offset[i] !== undefined ? radius*offset[i] : radius
                const px = Math.cos(angle)*effectiveRadius
                const py = Math.sin(angle)*effectiveRadius
                if (i == 0) ctx.moveTo(px, py)
                else ctx.lineTo(px, py)
            }
            ctx.closePath()
            ctx.fill()
            if (thickness > 0) ctx.stroke()
            ctx.restore()
        }


        function drawCircle(x, y, radius, dir, fill, outline, thickness) {
            ctx.fillStyle = fill
            ctx.strokeStyle = outline
            ctx.lineWidth = thickness

            ctx.save()
            ctx.translate(x, y)

        function drawLine(x, y, xPoints, yPoints, dir, fill, outline, thickness, closed=false) {
            ctx.fillStyle = fill
            ctx.strokeStyle = outline
            ctx.lineWidth = thickness

            ctx.save()
            ctx.translate(x, y)

            if (closed) ctx.closePath()
            ctx.fill()
            if (thickness > 0) ctx.stroke()
            ctx.restore()
        }

        function drawText(x, y, size, color, text, dir = 0, align = 'center', newlineMode = 'center', font = 'Arial', lineHeight = 1.2, outline = 0, outlineColor = '#ffffff') {
            ctx.save()
            ctx.fillStyle = color
            ctx.textAlign = 'left' // we handle alignment manually
            ctx.translate(x, y)
            ctx.rotate(degToRad(dir))

            const processedText = text.replace(/\s*\\n\s*/g, '\n')
            const lines = processedText.split('\n')
            const lineHeightPx = size * lineHeight

            function parseMarkdown(line) {
                const parts = []
                let i = 0

                while (i < line.length) {
                    if (line.slice(i, i + 3) === '***') {
                        let end = line.indexOf('***', i+3)
                        if (end !== -1) {
                            parts.push({ text: line.slice(i+3, end), style: 'bolditalic' })
                            i = end+3
                            continue
                        }
                    }
                    if (line.slice(i, i+2) === '**') {
                        let end = line.indexOf('**', i+2)
                        if (end !== -1) {
                            parts.push({ text: line.slice(i+2, end), style: 'bold' })
                            i = end + 2
                            continue
                        }
                    }
                    if (line[i] === '*') {
                        let end = line.indexOf('*', i+1)
                        if (end !== -1) {
                            parts.push({ text: line.slice(i+1, end), style: 'italic' })
                            i = end+1
                            continue
                        }
                    }

                    // normal text
                    let next = line.length
                    let nextMarkers = [
                        line.indexOf('***', i),
                        line.indexOf('**', i),
                        line.indexOf('*', i)
                    ].filter(v => v !== -1)

                    if (nextMarkers.length) next = Math.min(...nextMarkers)

                    parts.push({ text: line.slice(i, next), style: 'normal' })
                    i = next
                }

                return parts
            }

            function getFont(style) {
                if (style === 'bolditalic') return `italic bold ${size}px ${font}`
                if (style === 'bold') return `bold ${size}px ${font}`
                if (style === 'italic') return `italic ${size}px ${font}`
                return `${size}px ${font}`
            }

            function measureLine(parts) {
                let width = 0
                for (let p of parts) {
                    ctx.font = getFont(p.style)
                    width += ctx.measureText(p.text).width
                }
                return width
            }

            for (let i = 0; i < lines.length; i++) {
                const parts = parseMarkdown(lines[i])

                let lineY
                if (newlineMode === 'stacked') {
                    ctx.textBaseline = 'top'
                    lineY = i*lineHeightPx
                } else {
                    ctx.textBaseline = 'middle'
                    lineY = (i-(lines.length-1)/2)*lineHeightPx
                }

                const totalWidth = measureLine(parts)

                let startX = 0
                if (align === 'center') startX = -totalWidth/2
                if (align === 'right') startX = -totalWidth

                let offsetX = 0

                for (let p of parts) {
                    ctx.font = getFont(p.style)
                    if (outline > 0) {
                        ctx.shadowBlur = 0
                        ctx.shadowColor = outlineColor
                        for (let ox = -outline; ox <= outline; ox++) {
                            for (let oy = -outline; oy <= outline; oy++) {
                                if (ox == 0 && oy == 0) continue
                                ctx.shadowOffsetX = ox
                                ctx.shadowOffsetY = oy
                                ctx.fillText(p.text, startX + offsetX, lineY)
                            }
                        }
                        ctx.shadowOffsetX = 0
                        ctx.shadowOffsetY = 0
                        ctx.shadowColor = 'transparent'
                    }
                    ctx.fillText(p.text, startX + offsetX, lineY)
                    offsetX += ctx.measureText(p.text).width
                }
            }

            ctx.restore()
        }

        function drawSquircle(x, y, width, height, rotation = 0, fillColor = '', strokeColor = '', lineWidth = 0, cornerRadius = 10, roundedCorners = [1,1,1,1]) {
            ctx.save()
            ctx.translate(x, y)
            ctx.rotate(degToRad(rotation))
            const halfWidth = width/2
            const halfHeight = height/2

            ctx.beginPath()

            if (roundedCorners[0]) {
                ctx.moveTo(-halfWidth+cornerRadius, -halfHeight)
            } else {
                ctx.moveTo(-halfWidth, -halfHeight)
            }

            if (roundedCorners[1]) {
                ctx.lineTo(halfWidth-cornerRadius, -halfHeight)
                ctx.quadraticCurveTo(halfWidth, -halfHeight, halfWidth, -halfHeight+cornerRadius)
            } else {
                ctx.lineTo(halfWidth, -halfHeight)
            }

            if (roundedCorners[2]) {
                ctx.lineTo(halfWidth, halfHeight-cornerRadius)
                ctx.quadraticCurveTo(halfWidth, halfHeight, halfWidth-cornerRadius, halfHeight)
            } else {
                ctx.lineTo(halfWidth, halfHeight)
            }

            if (roundedCorners[3]) {
                ctx.lineTo(-halfWidth+cornerRadius, halfHeight)
                ctx.quadraticCurveTo(-halfWidth, halfHeight, -halfWidth, halfHeight-cornerRadius)
            } else {
                ctx.lineTo(-halfWidth, halfHeight)
            }

            if (roundedCorners[0]) {
                ctx.lineTo(-halfWidth, -halfHeight+cornerRadius)
                ctx.quadraticCurveTo(-halfWidth, -halfHeight, -halfWidth+cornerRadius, -halfHeight)
            } else {
                ctx.lineTo(-halfWidth, -halfHeight)
            }

            ctx.closePath()

            if (fillColor) {
                ctx.fillStyle = fillColor
                ctx.fill()
            }
            if (strokeColor && lineWidth > 0) {
                ctx.strokeStyle = strokeColor
                ctx.lineWidth = lineWidth
                ctx.stroke()
            }

            ctx.restore()
        }

        async function getServerList() {
            serverConfigs = []
            
            let rawList = await getKey('serverList')
            
            // Handle different possible formats
            if (!rawList) {
                serverList = []
            } else if (typeof rawList === 'string') {
                try {
                    serverList = JSON.parse(rawList)
                } catch {
                    serverList = [rawList] // If it's a single string ID
                }
            } else if (Array.isArray(rawList)) {
                serverList = rawList
            } else {
                serverList = []
            }
            
            // Remove duplicates just in case Firebase has issues
            serverList = [...new Set(serverList)]
            
            await loadServerConfigs()
            return serverList
        }

        async function loadServerConfigs() {
            // Create a new array, don't use a global variable that might persist
            const newConfigs = [];
            
            for (let i = 0; i < serverList.length; i++) {
                const serverID = serverList[i];
                try {
                    const configData = await getKey(`${serverID}/config`);
                    if (configData) {
                        let config;
                        if (typeof configData === 'string') {
                            config = JSON.parse(configData);
                        } else {
                            config = configData; // Already an object
                        }
                        config.id = serverID;
                        newConfigs.push(config);
                    }
                } catch (err) {
                    console.log('Error loading server config for', serverID, err);
                }
            }
            
            // Replace the global array completely
            serverConfigs = newConfigs;
        }

            serverList = await getServerList()
            
            // Filter to only include servers that are waiting for players
            let availableServers = []
            for (let i = 0; i < serverList.length; i++) {
                const serverID = serverList[i]
                const status = await getKey(`${serverID}/status`)
                if (status === '0') {
                    availableServers.push(serverID)
                }
            }
            
            // If no servers at all
            if (serverList.length === 0) {
                disconnectReason = 'No servers available'
                disconnectAction = 'Press enter or come back later!'
                console.log(`No servers available`)
                return
            }
            
            // If servers exist but none waiting
            if (availableServers.length === 0) {
                disconnectReason = 'All servers busy'
                disconnectAction = 'Wait for a match to finish and press enter!'
                console.log(`No available servers found`)
                return
            }
            
            // Pick the server with the most players
            let bestServer = null
            let maxPlayers = -1
            for (let i = 0; i < availableServers.length; i++) {
                const serverID = availableServers[i]
                const playerCount = await getKey(`${serverID}/playerCount`) || 0
                if (playerCount > maxPlayers) {
                    maxPlayers = playerCount
                    bestServer = serverID
                }
            }
            
            if (bestServer) {
                console.log(`Picked server ${bestServer} with ${maxPlayers} players`)
                serverName = bestServer
                const configStr = await getKey(`${serverName}/config`)
                serverJSON = JSON.parse(configStr)
                serverULID = await getKey(`${serverName}/ULID`)
                signallingServer = parseInt(await getKey(`${serverName}/signalling`))
                disconnectReason = 'none'
                connectToServer(serverULID)
                console.log(`Connecting to server: ${serverName}, ULID: ${serverULID}, signalling: ${signallingServer}`)
            } else {
                disconnectReason = 'No available servers found'
                console.log(`No available servers found`)
            }
        }

        currentSignallingServer = null
        async function connectToServer(serverULID) {
            if (signallingServer != currentSignallingServer) {
                await createPeer(signallingServer)
            }
            disconnectReason = 'none'
            disconnectWasFromServer = false
            disconnectAction = 'Press enter or try again later.'
            conn = peer.connect(serverULID)

            peer.on('error', (err) => {
                console.log('Peer connection error:', err)
                disconnectReason = 'Failed to connect to server'
                disconnectWasFromServer = false
                disconnectAction = 'Press enter or try again later.'
            })
            
            conn.on('open', () => {
                cameraTargetX = randomInt(-entityJSON.borderSize, entityJSON.borderSize)
                cameraTargetY = randomInt(-entityJSON.borderSize, entityJSON.borderSize)
            })
            
            conn.on('data', (data) => {
                try {
                    const message = JSON.parse(data)
                    if (message.opcode == "P_MSG") {
                        const [type, randomID, receivedData, serverPackage] = JSON.parse(message.payload)
                        lastServerUpdate = 0
                        if (type == "entityData") {
                            entityJSON = receivedData
                            serverTick = entityJSON.serverTick
                            playerID = serverPackage.ID
                            serverTps = serverPackage.tps
                        } else if (type == 'disconnect') {
                            playerID = -1
                            menu = 1
                            deathScreen = 0
                            disconnectReason = serverPackage
                            disconnectWasFromServer = true
                            disconnectAction = 'Press enter or try again later.'
                        } else if (type == 'sendNotification') {
                            notifications.text.push(serverPackage.text)
                            notifications.color.push(serverPackage.color)
                            notifications.timer.push(30*7)
                        } else if (type == 'updateConfig') {
                            serverJSON = serverPackage.serverJSON
                        }
                    }
                } catch (err) {
                    console.log('Parse error:', err)
                }
            })
            
            conn.on('error', (err) => {
                console.log('Connection error:', err)
                disconnectReason = 'Disconnected from server'
                disconnectWasFromServer = false
                disconnectAction = 'Press enter or try again later.'
            })
        }

        async function updatePingFromWebRTC() {
            if (!conn || !conn.peerConnection || playerID < 0) return
            
            try {
                const stats = await conn.peerConnection.getStats()
                stats.forEach(report => {
                    if (report.type === 'candidate-pair' && report.state === 'succeeded') {
                        if (report.currentRoundTripTime) {
                            const newPing = Math.round(report.currentRoundTripTime * 1000)
                            
                            pingSamples.push(newPing)
                            if (pingSamples.length > 20) {
                                pingSamples.shift()
                            }
                            
                            const weights = []
                            let totalWeight = 0
                            let weightedSum = 0
                            
                            for (let i = 0; i < pingSamples.length; i++) {
                                const weight = (i + 1)
                                weights.push(weight)
                                totalWeight += weight
                                weightedSum += pingSamples[i] * weight
                            }
                            
                            ping = Math.round(weightedSum / totalWeight)
                        }
                    }
                })
            } catch (err) {
                console.log('Ping update error:', err)
            }
        }

        function predict(ticks) {
            if (ticks <= 0) return
            let fullTicks = Math.floor(ticks)
            let frac = ticks-fullTicks
            let totalIters = fullTicks+(frac > 0.001 ? 1 : 0)

            for (let iter = 0; iter < totalIters; iter++) {
                let scale = (iter < fullTicks) ? 1 : frac
                if (scale <= 0) continue

                for (let i = 0; i < serverJSON.playerLimit; i++) {
                    if (entityJSON.playerAlive[i] != 1) continue

                    let connected = entityJSON.playerFlailConnected[i] == 1

                    // turning
                    let rawDiff = directionTo(entityJSON.playerWorldMouseX[i], entityJSON.playerWorldMouseY[i], entityJSON.playerX[i], entityJSON.playerY[i])-entityJSON.playerDirection[i]
                    let diff = Math.atan2(Math.sin(rawDiff*Math.PI/180), Math.cos(rawDiff*Math.PI/180))*180/Math.PI
                    let decay = connected ? 0.9 : 0.5
                    let divisor = connected ? (1+Math.sqrt(entityJSON.playerFlailSize[i])/10) : 0.5
                    entityJSON.playerAngularVelocity[i] = entityJSON.playerAngularVelocity[i]*(1-(1-decay)*scale)+diff*0.03*scale/divisor
                    entityJSON.playerDirection[i] += entityJSON.playerAngularVelocity[i]*scale

                    // flail growth from spinning
                    if (connected) entityJSON.playerFlailSize[i] += Math.abs(entityJSON.playerAngularVelocity[i])*scale/50

                    // flail size decay
                    if (connected) {
                        entityJSON.playerFlailSize[i] = clamp(entityJSON.playerFlailSize[i]-0.1*scale, 5, 100)
                    } else {
                        let decayRate = entityJSON.playerFlailSize[i] > 5 ? 0.3 : 0.1
                        entityJSON.playerFlailSize[i] = clamp(entityJSON.playerFlailSize[i]-decayRate*scale, 0, 100)
                        if (entityJSON.playerFlailSize[i] <= 0 || Math.sqrt(entityJSON.playerFlailSpeedX[i]**2+entityJSON.playerFlailSpeedY[i]**2) < 0.5) {
                            entityJSON.playerFlailConnected[i] = 1
                            connected = true
                        }
                    }

                    // acceleration towards facing direction
                    if (distanceTo(entityJSON.playerWorldMouseX[i], entityJSON.playerWorldMouseY[i], entityJSON.playerX[i], entityJSON.playerY[i]) > 25) {
                        entityJSON.playerSpeedX[i] += Math.cos(degToRad(entityJSON.playerDirection[i]))*0.3*scale
                        entityJSON.playerSpeedY[i] += Math.sin(degToRad(entityJSON.playerDirection[i]))*0.3*scale
                    }
                    entityJSON.playerSpeedX[i] *= 1-(1-0.92)*scale
                    entityJSON.playerSpeedY[i] *= 1-(1-0.92)*scale

                    entityJSON.playerX[i] += entityJSON.playerSpeedX[i]*scale
                    entityJSON.playerY[i] += entityJSON.playerSpeedY[i]*scale
                    entityJSON.playerX[i] = clamp(entityJSON.playerX[i], -entityJSON.borderSize+entityJSON.playerSize[i]/2, entityJSON.borderSize-entityJSON.playerSize[i]/2)
                    entityJSON.playerY[i] = clamp(entityJSON.playerY[i], -entityJSON.borderSize+entityJSON.playerSize[i]/2, entityJSON.borderSize-entityJSON.playerSize[i]/2)

                    // flail movement
                    if (connected) {
                        let oldFlailX = entityJSON.playerFlailX[i]
                        let oldFlailY = entityJSON.playerFlailY[i]
                        entityJSON.playerFlailX[i] = entityJSON.playerX[i]+Math.cos(degToRad(entityJSON.playerDirection[i]))*(20+entityJSON.playerSize[i]/2+entityJSON.playerFlailSize[i]/2)
                        entityJSON.playerFlailY[i] = entityJSON.playerY[i]+Math.sin(degToRad(entityJSON.playerDirection[i]))*(20+entityJSON.playerSize[i]/2+entityJSON.playerFlailSize[i]/2)
                        entityJSON.playerFlailSpeedX[i] = entityJSON.playerFlailX[i]-oldFlailX
                        entityJSON.playerFlailSpeedY[i] = entityJSON.playerFlailY[i]-oldFlailY
                    } else {
                        entityJSON.playerFlailSpeedX[i] *= 1-(1-0.96)*scale
                        entityJSON.playerFlailSpeedY[i] *= 1-(1-0.96)*scale
                        entityJSON.playerFlailX[i] += entityJSON.playerFlailSpeedX[i]*scale
                        entityJSON.playerFlailY[i] += entityJSON.playerFlailSpeedY[i]*scale
                    }
                    entityJSON.playerFlailX[i] = clamp(entityJSON.playerFlailX[i], -entityJSON.borderSize-entityJSON.playerFlailSize[i]/2, entityJSON.borderSize+entityJSON.playerFlailSize[i]/2)
                    entityJSON.playerFlailY[i] = clamp(entityJSON.playerFlailY[i], -entityJSON.borderSize-entityJSON.playerFlailSize[i]/2, entityJSON.borderSize+entityJSON.playerFlailSize[i]/2)

                    // self-collision - flail hits own player
                    if (!connected && entityJSON.playerFlailConnected[i] != 1) {
                        if (distanceTo(entityJSON.playerX[i], entityJSON.playerY[i], entityJSON.playerFlailX[i], entityJSON.playerFlailY[i]) <= entityJSON.playerSize[i]/2+entityJSON.playerFlailSize[i]/2) {

                        }
                    }
                }
            }
        }

                    drawShape(minimapPositionX+(entityJSON.playerX[i])/((entityJSON.borderSize)/(minimapSizeX/2)), minimapPositionY+(entityJSON.playerY[i])/((entityJSON.borderSize)/(minimapSizeY/2)), 2*(fov/360), 3, entityJSON.playerDirection[i], '#6696ff', 'ff00ff', 0)
                }
                drawShape(minimapPositionX+(entityJSON.playerFlailX[playerID])/((entityJSON.borderSize)/(minimapSizeX/2)), minimapPositionY+(entityJSON.playerFlailY[playerID])/((entityJSON.borderSize)/(minimapSizeY/2)), clamp((entityJSON.playerFlailSize[playerID]/20), 0.5, 16)*(fov/360), 16, 0, '#bf4d4d', 'ff00ff', 0)
                drawShape(minimapPositionX+(entityJSON.playerX[playerID])/((entityJSON.borderSize)/(minimapSizeX/2)), minimapPositionY+(entityJSON.playerY[playerID])/((entityJSON.borderSize)/(minimapSizeY/2)), 2.5*(fov/360), 3, entityJSON.playerDirection[playerID], '#000000', 'ff00ff', 0)

                // notifications
                if (lastNotificationID != entityJSON.serverNotification.id && lastNotificationID != null) {
                    notifications.text.push(entityJSON.serverNotification.text)
                    notifications.color.push(entityJSON.serverNotification.color)
                    notifications.timer.push(30*7)
                }
                lastNotificationID = entityJSON.serverNotification.id

                for (let i=0; i < notifications.text.length; i++) {
                    notifications.timer[i] -= 1
                    if (notifications.timer[i] <= 0) {
                        notifications.text.splice(i, 1)
                        notifications.color.splice(i, 1)
                        notifications.timer.splice(i, 1)
                        i--
                    }
                }
                for (let i=0; i < notifications.text.length; i++) {
                    drawText(0, (i+1)*12*(fov/360)-(screenSizeY/2), 10*(fov/360), notifications.color[i], notifications.text[i], 0, 'center')
                }

                // 1st place screen
                if (entityJSON.playerHP && entityJSON.playerAlive[playerID] == 1 && entityJSON.playerHP.filter((hp, idx) => hp > 0 && entityJSON.playerAlive[idx] == 1).length == 1 && entityJSON.gameStatus == 3) {
                    drawText(0, -screenSizeY/4, 50*(fov/360), '#FFD700', '1ST PLACE!', 0, 'center')
                }
                // waiting...
                let aliveCount = entityJSON.playerHP.filter((hp, idx) => hp > 0 && entityJSON.playerAlive[idx] == 1).length
                let dotCount = Math.floor((Date.now()%1000)/250)
                let dots = '', spaces = ''
                for (let i = 0; i < dotCount; i++) { dots += '.'; spaces += ' ' }
                if (entityJSON.gameStatus == 0) {
                    let needed = 2-aliveCount
                    drawText(0, screenSizeY/2-20, 12*(fov/360), '#000000', `${spaces}${needed > 0 ? `Need ${needed} more player${needed > 1 ? 's' : ''} to start` : 'Ready to start!'}${dots}`, 0, 'center')
                }
                if (entityJSON.gameStatus == 1) {
                    let needed = serverJSON.playerLimit-aliveCount
                    drawText(0, screenSizeY/2-20, 12*(fov/360), '#000000', `${spaces}${needed > 0 ? `Waiting for up to ${needed} more players` : 'Server full'}${dots}`, 0, 'center')
                }
                if (entityJSON.gameStatus == 2) {
                    drawText(0, screenSizeY/2-20, 12*(fov/360), '#000000', `${aliveCount-1} player${aliveCount-1 > 1 ? 's' : ''} remain${aliveCount-1 > 1 ? '...' : 's!'}`, 0, 'center')
                }
                
                lastServerUpdate += 1
            }

            if (playerID >= 0) {
                if (menu == 1) {
                    if (cameraSpeed < 0.5) {
                        cameraSpeed += 0.005
                        cameraX += cameraSpeed*Math.cos(degToRad(directionTo(cameraTargetX, cameraTargetY, cameraX, cameraY)))
                        cameraY += cameraSpeed*Math.sin(degToRad(directionTo(cameraTargetX, cameraTargetY, cameraX, cameraY)))
                    } else if (distanceTo(cameraTargetX, cameraTargetY, cameraX, cameraY) > 50) {
                        cameraX += 0.5*Math.cos(degToRad(directionTo(cameraTargetX, cameraTargetY, cameraX, cameraY)))
                        cameraY += 0.5*Math.sin(degToRad(directionTo(cameraTargetX, cameraTargetY, cameraX, cameraY)))
                    } else if (distanceTo(cameraTargetX, cameraTargetY, cameraX, cameraY) > 10) {
                        cameraX += (distanceTo(cameraTargetX, cameraTargetY, cameraX, cameraY)/100)*Math.cos(degToRad(directionTo(cameraTargetX, cameraTargetY, cameraX, cameraY)))
                        cameraY += (distanceTo(cameraTargetX, cameraTargetY, cameraX, cameraY)/100)*Math.sin(degToRad(directionTo(cameraTargetX, cameraTargetY, cameraX, cameraY)))
                    } else {
                        cameraSpeed = 0
                        cameraTargetX = randomInt(-entityJSON.borderSize, entityJSON.borderSize)
                        cameraTargetY = randomInt(-entityJSON.borderSize, entityJSON.borderSize)
                    }
                } else {
                    cameraX = entityJSON.playerX[playerID]
                    cameraY = entityJSON.playerY[playerID]
                }
            }

            // Debug HUD
            if (isKeyPressed('i')) {
                if (playerID >= 0) {
                    drawText(-screenSizeX/2+2*(fov/360), -screenSizeY/2+2*(fov/360), 6*(fov/360), '#000000', 
`FPS: ${fps}
MSPT: ${Math.round(mspt*1000)/1000}
Ping: ${ping || 0}ms
Server TPS: ${serverTps || 30}
Map: ${entityJSON.borderSize ? entityJSON.borderSize*2 : 1500}x${entityJSON.borderSize ? entityJSON.borderSize*2 : 1500}
Position: ${Math.round(cameraX)}, ${Math.round(cameraY)}
Players: ${entityJSON.playerHP.filter((hp, idx) => hp > 0 && entityJSON.playerAlive[idx] == 1).length}/${serverJSON.playerLimit || 16}
Alive: ${entityJSON.playerAlive && entityJSON.playerAlive[playerID] ? 'Yes' : 'No'}`
            , 0, 'left', 'stacked')
                }
            } else if (isKeyPressed('f')) {
                if (playerID >= 0) {
                    drawText(-screenSizeX/2+2*(fov/360), -screenSizeY/2+2*(fov/360), 6*(fov/360), '#000000', 
`FPS: ${fps}
MSPT: ${Math.round(mspt*1000)/1000}
Ping: ${ping || 0}ms`
            , 0, 'left', 'stacked')
                }
            }

            // Menus
            if (deathScreen == 1) {
                drawRect(0, 0, screenSizeX*(fov/360), screenSizeY*(fov/360), 0, '#00000050', 0, 0)
                drawText(0, -50*(fov/360), 20*(fov/360), '#000000', `${entityJSON.playerRank[playerID]}${entityJSON.playerRank[playerID] == 1 ? 'st' : entityJSON.playerRank[playerID] == 2 ? 'nd' : entityJSON.playerRank[playerID] == 3 ? 'rd' : 'th'} place`, 0, 'center')
                drawText(0, 0, 75*(fov/360), '#ff0000', `YOU DIED`, 0, 'center')
                drawText(0, 40*(fov/360), 16*(fov/360), '#000000', `Press enter to return to lobby`, 0, 'center')
            }

            if (menu == 1) {
                let input = document.getElementById('usernameInput')
                input.style.display = 'block'
                
                drawRectHTML(input, 0, 0, 200*(fov/360), 22*(fov/360), 0, '#ffffff', '#bfbfbf', 2)
                input.style.fontSize = (16*(fov/360)*scale) + 'px'
                
                if (playerID >= 0) {
                    drawRect(0, 0, screenSizeX*(fov/360), screenSizeY*(fov/360), 0, '#00000050', 0, 0)
                    drawText(0, -22*(fov/360), 16*(fov/360), '#000000', `Connected!`, 0, 'center')
                    drawText(0, 22*(fov/360), 12*(fov/360), '#000000', `Press enter to play!`, 0, 'center')
                    drawText(0, ((screenSizeY/2)-(8*(fov/360))), 8*(fov/360), '#000000', `${tips[tipsIndex]}`, 0, 'center')
                } else if (disconnectReason == 'none') {
                    let dotCount = Math.floor((Date.now()%1000)/250)
                    let dots = ''
                    let spaces = ''
                    for (let i = 0; i < dotCount; i++) {
                        dots += '.'
                        spaces += ' '
                    }
                    drawRect(0, 0, screenSizeX*(fov/360), screenSizeY*(fov/360), 0, '#00000050', 0, 0)
                    drawText(0, -22*(fov/360), 16*(fov/360), '#000000', `${spaces}Connecting${dots}`, 0, 'center')
                    drawText(0, ((screenSizeY/2)-(8*(fov/360))), 8*(fov/360), '#000000', `${tips[tipsIndex]}`, 0, 'center')
                } else if (disconnectReason == `Flingy.io Lobby`) {
                    drawRect(0, 0, screenSizeX*(fov/360), screenSizeY*(fov/360), 0, '#00000050', 0, 0)
                    drawText(0, -22*(fov/360), 16*(fov/360), '#000000', `${disconnectReason}`, 0, 'center')
                    drawText(0, 22*(fov/360), 12*(fov/360), '#000000', `${disconnectAction}`, 0, 'center')
                    drawText(0, ((screenSizeY/2)-(8*(fov/360))), 8*(fov/360), '#000000', `${tips[tipsIndex]}`, 0, 'center')
                } else if (disconnectWasFromServer == false) {
                    drawRect(0, 0, screenSizeX*(fov/360), screenSizeY*(fov/360), 0, '#ffdb0080', 0, 0)
                    drawText(0, -22*(fov/360), 16*(fov/360), '#000000', `Failed to connect to server...`, 0, 'center')
                    drawText(0, 22*(fov/360), 12*(fov/360), '#000000', `${disconnectReason}`, 0, 'center')
                    drawText(0, 32*(fov/360), 8*(fov/360), '#000000', `${disconnectAction}`, 0, 'center', 'stacked')
                    drawText(0, ((screenSizeY/2)-(8*(fov/360))), 8*(fov/360), '#000000', `${tips[tipsIndex]}`, 0, 'center')
                } else if (disconnectWasFromServer == true) {
                    drawRect(0, 0, screenSizeX*(fov/360), screenSizeY*(fov/360), 0, '#620000c0', 0, 0)
                    drawText(0, -22*(fov/360), 16*(fov/360), '#000000', `Disconnected!`, 0, 'center')
                    drawText(0, 22*(fov/360), 12*(fov/360), '#000000', `${disconnectReason}`, 0, 'center')
                    drawText(0, 32*(fov/360), 8*(fov/360), '#000000', `${disconnectAction}`, 0, 'center', 'stacked')
                    drawText(0, ((screenSizeY/2)-(8*(fov/360))), 8*(fov/360), '#000000', `${tips[tipsIndex]}`, 0, 'center')
                }

                drawMenuButtons()
                
                username = input.value || 'unnamed'
            } else {
                // hide menu buttons
                document.getElementById('usernameInput').style.display = 'none'
                document.getElementById('discordButton').style.display = 'none'
                for (let i = 0; i < 100; i++) {
                    const button = document.getElementById(`serverButton_${i}`);
                    if (button) {
                        button.remove();
                    }
                }
            }

            // status
            if (menu == 1 && serverStatus.text != '' && serverStatus.color != '') {
                let lines = wrapWords(serverStatus.text, 142).split('\n').length
                let statusSizeX = 150*(fov/360)
                let statusSizeY = (4+(10*lines+((lines-1)*(0.2*10)))+4)*(fov/360)
                let statusPositionX = -screenSizeX/2+(statusSizeX/2)+10*(fov/360)
                let statusPositionY = -screenSizeY/2+(statusSizeY/2)+10*(fov/360)
                drawSquircle(statusPositionX, statusPositionY, statusSizeX, statusSizeY, 0, `${serverStatus.color}ff`, `${interpolateColors(serverStatus.color, '#000000', 0.2)}ff`, 2, 2*(fov/360))
                drawText(statusPositionX-statusSizeX/2+4*(fov/360), statusPositionY-statusSizeY/2+4*(fov/360), 10*(fov/360), '#000000', wrapWords(serverStatus.text, 142), 0, 'left', 'stacked')
            }

            ctx.restore()

            mspt = performance.now()-frameStart
        }, 33.33)

        function startMenuLoop() {
            setInterval(async () => {
                if (!running) return
                
                let enterNow = isKeyPressed('Enter')
                let enterPressedThisFrame = !enterWasPressedLastFrame && enterNow
                enterWasPressedLastFrame = enterNow
                
                if (enterPressedThisFrame) {
                    if (playerID >= 0) {
                        if (deathScreen == 1) {
                            deathScreen = 0
                            menu = 1
                            if (conn && conn.open) {
                                conn.close()
                            }
                            playerID = -1
                            disconnectReason = `Flingy.io Lobby`
                            disconnectWasFromServer = false
                            disconnectAction = 'Press enter to find a match!'
                        } else if (menu == 1) {
                            menu = 0
                            deathCheckCooldown = true
                            // await spawnPlayer()
                            await waitUntil(() => entityJSON.playerAlive[playerID] == 1)
                            setTimeout(() => {deathCheckCooldown = false}, 3000)
                        }
                    } else {
                        await pickServer()
                    }
                }
                
                // Check if player died
                if (entityJSON.playerHP && !deathCheckCooldown && menu == 0) {
                    if (entityJSON.playerHP[playerID] <= 0) {
                        deathScreen = 1
                    }
                }
                
                // Reset death screen if on menu
                if (menu == 1) {
                    deathScreen = 0
                }

                // exit menu if alive ingame 
                if (playerID >= 0) {
                    if ((menu == 1 || deathScreen == 1) && entityJSON.playerAlive[playerID] == 1) {
                        menu = 0
                        deathScreen = 0
                    }
                }
            }, 33.33)
        }

        function startStorageLoop() {
            username = getStoredKey('username') || ''
            if (username) {
                let input = document.getElementById('usernameInput')
                if (input) input.value = username
            }
            setInterval(() => {
                let input = document.getElementById('usernameInput')
                let currentUsername = input ? input.value || 'unnamed' : 'unnamed'
                setStoredKey('username', currentUsername)
            }, 5000)
        }

        tipsIndex = 0
        function startTipsLoop() {
            shuffleArray(tips)
            setInterval(() => {    
                tipsIndex++            
                if (tipsIndex >= tips.length) {
                    shuffleArray(tips)
                    tipsIndex = 0
                }
            }, 8000)
        }

        async function startServerStatusLoop() {
            serverStatus.text = (await getKey(`flingy_status_text`, 'flingy')) || ''
            serverStatus.color = (await getKey(`flingy_status_color`, 'flingy')) || '#000000'
            setInterval(async () => {
                if (menu == 1) {
                    serverStatus.text = (await getKey(`flingy_status_text`, 'flingy')) || ''
                    serverStatus.color = (await getKey(`flingy_status_color`, 'flingy')) || '#000000'
                }
            }, 5000)
        }

    </script>
</body>
</html>
